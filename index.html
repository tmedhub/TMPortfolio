<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clean Seamless Scroll</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
:root{
  --x:50%;
  --y:50%;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#000;overflow-x:hidden}

body.lock{overflow:hidden}

#stage{
  height:200vh;
  cursor:none;
}

.pin{
  position:sticky;
  top:0;
  height:100vh;
  overflow:hidden;
}

/* SINGLE IMAGE STACK APPROACH */
.scene{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  will-change:transform;
}

#bg1{background-image:url("bg1.png"); z-index:2;}
#bg2{background-image:url("bg2.jpeg"); z-index:1;}
#bg3{background-image:url("bg3.jpeg"); z-index:0;}

#dark{
  position:absolute;
  inset:0;
  background:black;
  pointer-events:none;
  mask-image:radial-gradient(400px 600px at var(--x) var(--y), transparent 0%, black 70%);
}

#torch{
  position:absolute;
  width:70px;
  transform:translate(-50%,-15%) rotate(-20deg);
}

</style>
</head>
<body>

<section id="stage">
  <div class="pin">
    <div id="bg3" class="scene"></div>
    <div id="bg2" class="scene"></div>
    <div id="bg1" class="scene"></div>
    <div id="dark"></div>
    <img id="torch" src="torchtm.png" />
  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

const root=document.documentElement;
const torch=document.getElementById("torch");
const dark=document.getElementById("dark");

/* LOCK SCROLL HARD */
function lock(){
  document.body.classList.add("lock");
  window.scrollTo(0,0);
}
function unlock(){
  document.body.classList.remove("lock");
  document.body.style.cursor="auto";
  ScrollTrigger.refresh();
}
lock();

/* TORCH */
document.addEventListener("mousemove",e=>{
  root.style.setProperty("--x",e.clientX+"px");
  root.style.setProperty("--y",e.clientY+"px");
  torch.style.left=e.clientX+"px";
  torch.style.top=e.clientY+"px";
});

setTimeout(()=>{
  dark.style.opacity=0;
  torch.style.opacity=0;
  unlock();
},2500);

/* CLEAN TRANSITION (NO FADE TO BLACK EVER) */
let tl=gsap.timeline({
  scrollTrigger:{
    trigger:"#stage",
    start:"top top",
    end:"bottom bottom",
    scrub:1
  }
});

/* STEP 1: zoom bg1 */
tl.to("#bg1",{
  scale:1.25,
  yPercent:8,
  ease:"none"
},0);

/* STEP 2: reveal bg2 by pushing bg1 away */
tl.to("#bg1",{
  scale:1.5,
  yPercent:15,
  ease:"none"
},0.4);

/* STEP 3: continue into bg3 */
tl.to("#bg2",{
  scale:1.2,
  yPercent:-5,
  ease:"none"
},0.6);

tl.to("#bg3",{
  scale:1,
  yPercent:0,
  ease:"none"
},0.6);

</script>
</body>
</html>
