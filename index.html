<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Museum Scroll</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <style>
    :root{
      --gold:#f5d9a6;
      --bg:#000;
      --mouseX:50vw;
      --mouseY:50vh;
      --torchW:320px;
      --torchH:460px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      min-height:100%;
      background:#000;
      color:var(--gold);
      overflow-x:hidden;
      font-family:Georgia, serif;
    }

    body.intro-active{
      overflow:hidden;
    }

    button{
      font:inherit;
      color:inherit;
      border:none;
      background:none;
      cursor:pointer;
    }

    /* fixed UI */
    .top-btn{
      position:fixed;
      top:18px;
      z-index:2000;
      display:inline-flex;
      align-items:center;
      gap:.8rem;
      padding:.9rem 1.1rem;
      border-radius:999px;
      border:1px solid rgba(245,217,166,.28);
      background:rgba(0,0,0,.28);
      color:var(--gold);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      letter-spacing:.14em;
      text-transform:uppercase;
      font-size:.72rem;
      transition:transform .22s ease, background .22s ease, border-color .22s ease;
    }

    .top-btn:hover{
      transform:translateY(-2px);
      background:rgba(18,14,11,.55);
      border-color:rgba(245,217,166,.45);
    }

    .menu-toggle{ left:18px; }
    .work-toggle{ right:18px; }

    .burger{
      display:grid;
      gap:4px;
    }

    .burger span{
      display:block;
      width:18px;
      height:1.5px;
      background:currentColor;
      border-radius:999px;
    }

    .menu-panel{
      position:fixed;
      left:18px;
      top:68px;
      width:310px;
      padding:1.1rem 1.35rem 1.35rem;
      background:rgba(0,0,0,.96);
      z-index:2010;
      opacity:0;
      pointer-events:none;
      transform:translateY(-8px);
      transition:opacity .22s ease, transform .22s ease;
    }

    .menu-panel.open{
      opacity:1;
      pointer-events:auto;
      transform:translateY(0);
    }

    .menu-top{
      display:flex;
      justify-content:flex-end;
    }

    .menu-close{
      width:28px;
      height:28px;
      display:grid;
      place-items:center;
      color:var(--gold);
    }

    .menu-list{
      display:grid;
      gap:1.95rem;
      padding-top:.35rem;
    }

    .menu-link{
      width:100%;
      text-align:left;
    }

    .menu-link strong{
      display:block;
      font-size:1.08rem;
      font-weight:600;
    }

    .menu-link span{
      display:block;
      margin-top:.36rem;
      font-size:.72rem;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:rgba(245,217,166,.82);
    }

    /* master sequence */
    #sequence{
      position:relative;
      height:420vh;
      background:#000;
    }

    .sticky-scene{
      position:sticky;
      top:0;
      height:100vh;
      overflow:hidden;
      background:#000;
      isolation:isolate;
    }

    .layer{
      position:absolute;
      inset:-8vh -8vw;
      width:calc(100% + 16vw);
      height:calc(100% + 16vh);
      object-fit:cover;
      will-change:transform, opacity, clip-path, filter;
      pointer-events:none;
      user-select:none;
      max-width:none;
    }

    .sky{ z-index:1; }
    .mid{ z-index:2; }
    .front{ z-index:3; }
    .foreground{ z-index:4; }

    .hall{
      z-index:6;
      opacity:0;
      filter:blur(12px);
      clip-path:ellipse(3% 5% at 63% 76%);
      transform:scale(1.16);
      transform-origin:center center;
    }

    /* torch intro overlay */
    .intro-overlay{
      position:absolute;
      inset:0;
      z-index:20;
      pointer-events:none;
      opacity:1;
      transition:opacity 1s ease;
    }

    .intro-overlay.hidden{
      opacity:0;
    }

    .darkness{
      position:absolute;
      inset:0;
      background:#000;
      mask-image:radial-gradient(
        ellipse var(--torchW) var(--torchH) at var(--mouseX) var(--mouseY),
        transparent 0%,
        rgba(0,0,0,0.18) 30%,
        rgba(0,0,0,0.75) 52%,
        #000 70%
      );
      -webkit-mask-image:radial-gradient(
        ellipse var(--torchW) var(--torchH) at var(--mouseX) var(--mouseY),
        transparent 0%,
        rgba(0,0,0,0.18) 30%,
        rgba(0,0,0,0.75) 52%,
        #000 70%
      );
    }

    .torch{
      position:absolute;
      left:var(--mouseX);
      top:var(--mouseY);
      width:72px;
      transform:translate(-50%, -18%) rotate(-18deg);
      pointer-events:none;
      filter:drop-shadow(0 10px 24px rgba(0,0,0,.35));
      opacity:1;
      transition:opacity .6s ease;
    }

    .intro-overlay.hidden .torch{
      opacity:0;
    }

    .vignette{
      position:absolute;
      inset:0;
      z-index:10;
      pointer-events:none;
      background:
        radial-gradient(
          ellipse at center,
          rgba(0,0,0,0) 56%,
          rgba(0,0,0,.16) 78%,
          rgba(0,0,0,.32) 100%
        );
    }

    .fade-cover{
      position:absolute;
      inset:0;
      z-index:7;
      pointer-events:none;
      background:#000;
      opacity:0;
      will-change:opacity;
    }

    /* actual content after hallway */
    #hallway-content{
      min-height:100vh;
      background:#120d09;
      display:grid;
      place-items:center;
      padding:5rem 1.5rem;
      text-align:center;
    }

    #hallway-content h2{
      font-size:clamp(2rem, 4vw, 4rem);
      margin-bottom:1rem;
    }

    #hallway-content p{
      max-width:760px;
      line-height:1.7;
      color:rgba(245,217,166,.8);
    }

    @media (max-width: 768px){
      :root{
        --torchW:220px;
        --torchH:320px;
      }

      .top-btn{
        top:14px;
        font-size:.66rem;
        padding:.8rem .95rem;
      }

      .menu-toggle{ left:14px; }
      .work-toggle{ right:14px; }

      .menu-panel{
        top:62px;
        left:14px;
        width:min(310px, calc(100vw - 28px));
      }

      .torch{
        width:54px;
      }

      .hall{
        clip-path:ellipse(4% 6% at 63% 76%);
      }
    }
  </style>
</head>
<body class="intro-active">
  <button class="top-btn menu-toggle" id="menuToggle">
    <span class="burger"><span></span><span></span><span></span></span>
    <span>Museum's Galleries</span>
  </button>

  <button class="top-btn work-toggle">Let's Work Together</button>

  <div class="menu-panel" id="menuPanel">
    <div class="menu-top">
      <button class="menu-close" id="menuClose">✕</button>
    </div>
    <div class="menu-list">
      <button class="menu-link"><strong>Canvas Studio</strong><span>Gallery 01</span></button>
      <button class="menu-link"><strong>Project Arcade</strong><span>Gallery 02</span></button>
      <button class="menu-link"><strong>Customization Co-op</strong><span>Gallery 03</span></button>
      <button class="menu-link"><strong>Director's Dome</strong><span>Gallery 04</span></button>
    </div>
  </div>

  <section id="sequence">
    <div class="sticky-scene" id="sceneRoot">
      <!-- exterior layers -->
      <img src="bg1-sky.png" class="layer sky" alt="">
      <img src="bg1-mid.png" class="layer mid" alt="">
      <img src="bg1-front.png" class="layer front" alt="">
      <img src="bg1-foreground.png" class="layer foreground" alt="">

      <!-- hallway -->
      <img src="bg2-main.png" class="layer hall" alt="">

      <div class="fade-cover"></div>
      <div class="vignette"></div>

      <!-- torch intro lives on top of SAME scene -->
      <div class="intro-overlay" id="introOverlay">
        <div class="darkness"></div>
        <img src="torchtm.png" class="torch" id="torch" alt="">
      </div>
    </div>
  </section>

  <section id="hallway-content">
    <div>
      <h2>Inside the Museum</h2>
      <p>
        Replace this with your actual gallery content.
      </p>
    </div>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const body = document.body;
    const introOverlay = document.getElementById("introOverlay");
    const menuToggle = document.getElementById("menuToggle");
    const menuPanel = document.getElementById("menuPanel");
    const menuClose = document.getElementById("menuClose");

    let introDone = false;

    function setMousePosition(x, y){
      document.documentElement.style.setProperty("--mouseX", `${x}px`);
      document.documentElement.style.setProperty("--mouseY", `${y}px`);
    }

    // initialize cursor position center
    setMousePosition(window.innerWidth * 0.5, window.innerHeight * 0.5);

    window.addEventListener("mousemove", (e) => {
      setMousePosition(e.clientX, e.clientY);
    });

    window.addEventListener("touchmove", (e) => {
      if (!e.touches[0]) return;
      setMousePosition(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    // menu
    menuToggle.addEventListener("click", () => {
      menuPanel.classList.toggle("open");
    });

    menuClose.addEventListener("click", () => {
      menuPanel.classList.remove("open");
    });

    document.addEventListener("click", (e) => {
      if (!menuPanel.contains(e.target) && !menuToggle.contains(e.target)) {
        menuPanel.classList.remove("open");
      }
    });

    // intro reveal
    function endIntro(){
      if (introDone) return;
      introDone = true;
      introOverlay.classList.add("hidden");
      body.classList.remove("intro-active");

      setTimeout(() => {
        introOverlay.style.display = "none";
        ScrollTrigger.refresh();
      }, 1100);
    }

    // auto end intro
    window.addEventListener("load", () => {
      setTimeout(endIntro, 2200);
    });

    // also allow click to skip
    window.addEventListener("click", () => {
      if (!introDone) endIntro();
    }, { once: true });

    // parallax timeline
    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: "#sequence",
        start: "top top",
        end: "bottom bottom",
        scrub: 1.1
      }
    });

    // Keep transforms complete, don't mix CSS transform translate with GSAP xPercent/yPercent.
    gsap.set(".sky", { scale: 1, xPercent: 0, yPercent: 0 });
    gsap.set(".mid", { scale: 1, xPercent: 0, yPercent: 0 });
    gsap.set(".front", { scale: 1, xPercent: 0, yPercent: 0 });
    gsap.set(".foreground", { scale: 1, xPercent: 0, yPercent: 0 });
    gsap.set(".hall", { scale: 1.16, xPercent: 0, yPercent: 0 });

    // exterior camera push
    tl.to(".sky", {
      scale: 1.04,
      yPercent: -1.5,
      ease: "none"
    }, 0);

    tl.to(".mid", {
      scale: 1.10,
      yPercent: -4,
      ease: "none"
    }, 0);

    tl.to(".front", {
      scale: 1.18,
      yPercent: -8,
      xPercent: 1,
      ease: "none"
    }, 0);

    tl.to(".foreground", {
      scale: 1.28,
      yPercent: -12,
      xPercent: -2.5,
      ease: "none"
    }, 0);

    // hallway starts from museum door area
    tl.to(".hall", {
      opacity: 1,
      filter: "blur(8px)",
      clipPath: "ellipse(10% 14% at 63% 76%)",
      scale: 1.11,
      ease: "none"
    }, 0.34);

    tl.to(".hall", {
      filter: "blur(2px)",
      clipPath: "ellipse(28% 32% at 59% 64%)",
      scale: 1.04,
      ease: "none"
    }, 0.52);

    tl.to(".hall", {
      filter: "blur(0px)",
      clipPath: "ellipse(140% 140% at 50% 50%)",
      scale: 1,
      ease: "none"
    }, 0.72);

    tl.to(".sky", { opacity: 0, ease: "none" }, 0.72);
    tl.to(".mid", { opacity: 0, ease: "none" }, 0.72);
    tl.to(".front", { opacity: 0, ease: "none" }, 0.72);
    tl.to(".foreground", { opacity: 0, ease: "none" }, 0.72);

    // subtle hallway drift after reveal
    tl.to(".hall", {
      scale: 1.05,
      ease: "none"
    }, 0.88);

    window.addEventListener("resize", () => {
      ScrollTrigger.refresh();
    });
  </script>
</body>
</html>
