<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Single Scroll Cinematic Museum</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <style>
    :root {
      --x: 50vw;
      --y: 50vh;

      /* Doorway anchor: tweak ONLY these if needed */
      --door-x: 50%;
      --door-y: 58%;

      /* hallway reveal amount */
      --reveal: 0%;

      /* torch beam */
      --beam-x: 28vw;
      --beam-y: 20vw;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    body.intro-active {
      cursor: none;
    }

    .scroll-wrap {
      position: relative;
      height: 460vh;
      background: #000;
    }

    .pin-scene {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      background: #000;
    }

    .layer {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      transform-origin: center center;
      pointer-events: none;
      user-select: none;
      max-width: none;
      will-change: transform, opacity, clip-path;
    }

    /* back to front */
    .sky {
      z-index: 1;
      width: 128vw;
      height: 128vh;
      object-fit: cover;
    }

    .mid {
      z-index: 2;
      width: 124vw;
      height: 124vh;
      object-fit: cover;
    }

    .hallway {
      z-index: 3;
      width: 124vw;
      height: 124vh;
      object-fit: cover;
      clip-path: circle(var(--reveal) at var(--door-x) var(--door-y));
      opacity: 1;
    }

    .museum {
      z-index: 4;
      width: 116vw;
      height: 116vh;
      object-fit: contain;
    }

    .front {
      z-index: 5;
      width: 126vw;
      height: 126vh;
      object-fit: cover;
    }

    .foreground {
      z-index: 6;
      width: 132vw;
      height: 132vh;
      object-fit: cover;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      background:
        radial-gradient(circle at center,
          rgba(0,0,0,0) 45%,
          rgba(0,0,0,0.18) 72%,
          rgba(0,0,0,0.45) 100%);
    }

    .darkness {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      opacity: 1;
      background:
        radial-gradient(
          ellipse var(--beam-x) var(--beam-y) at var(--x) var(--y),
          rgba(0,0,0,0) 0%,
          rgba(0,0,0,0.04) 18%,
          rgba(0,0,0,0.28) 34%,
          rgba(0,0,0,0.72) 54%,
          rgba(0,0,0,0.97) 100%
        );
      will-change: opacity, background;
    }

    .torch {
      position: fixed;
      left: 0;
      top: 0;
      width: 88px;
      z-index: 60;
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: 1;
      will-change: transform, opacity;
      filter: drop-shadow(0 0 18px rgba(255, 176, 88, 0.16));
    }

    .credits {
      position: fixed;
      left: 18px;
      bottom: 16px;
      z-index: 80;
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    @media (hover: none), (pointer: coarse) {
      body.intro-active {
        cursor: auto;
      }

      .torch {
        display: none;
      }

      :root {
        --beam-x: 44vw;
        --beam-y: 34vw;
      }

      .museum {
        width: 128vw;
        height: 118vh;
      }

      .sky,
      .mid,
      .front,
      .foreground,
      .hallway {
        width: 138vw;
        height: 128vh;
      }
    }
  </style>
</head>
<body class="intro-active">
  <main class="scroll-wrap">
    <section class="pin-scene">
      <div class="scene" id="scene">

        <!-- BACK TO FRONT -->
        <img src="bg1-sky.png" class="layer sky" alt="Sky" />
        <img src="bg1-mid.png" class="layer mid" alt="Distant trees" />
        <img src="hallway.jpeg" class="layer hallway" alt="Hallway" />
        <img src="bg2-main.png" class="layer museum" alt="Museum" />
        <img src="bg1-front.png" class="layer front" alt="Front layer" />
        <img src="bg1-foreground.png" class="layer foreground" alt="Foreground layer" />

        <div class="vignette"></div>
        <div class="darkness" id="darkness"></div>
      </div>
    </section>
  </main>

  <img src="torchtm.png" class="torch" id="torch" alt="Torch" />
  <div class="credits">Single scroll cinematic scene</div>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const root = document.documentElement;
    const body = document.body;

    const torch = document.getElementById("torch");
    const darkness = document.getElementById("darkness");

    const sky = document.querySelector(".sky");
    const mid = document.querySelector(".mid");
    const museum = document.querySelector(".museum");
    const front = document.querySelector(".front");
    const foreground = document.querySelector(".foreground");
    const hallway = document.querySelector(".hallway");

    const isTouch = window.matchMedia("(hover: none), (pointer: coarse)").matches;

    let targetX = window.innerWidth * 0.5;
    let targetY = window.innerHeight * 0.55;
    let currentX = targetX;
    let currentY = targetY;

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function setPointer(x, y) {
      targetX = clamp(x, 0, window.innerWidth);
      targetY = clamp(y, 0, window.innerHeight);
    }

    function onMove(e) {
      setPointer(e.clientX, e.clientY);
    }

    function onTouch(e) {
      if (!e.touches || !e.touches[0]) return;
      setPointer(e.touches[0].clientX, e.touches[0].clientY);
    }

    function renderTorch() {
      currentX += (targetX - currentX) * 0.16;
      currentY += (targetY - currentY) * 0.16;

      root.style.setProperty("--x", currentX + "px");
      root.style.setProperty("--y", currentY + "px");

      if (!isTouch) {
        torch.style.transform = `translate(${currentX}px, ${currentY}px) translate(-50%, -50%)`;
      }

      requestAnimationFrame(renderTorch);
    }

    window.addEventListener("mousemove", onMove, { passive: true });
    window.addEventListener("touchstart", onTouch, { passive: true });
    window.addEventListener("touchmove", onTouch, { passive: true });

    function preload(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = resolve;
        img.onerror = resolve;
        img.src = src;
      });
    }

    async function preloadAll() {
      await Promise.all([
        preload("bg1-sky.png"),
        preload("bg1-mid.png"),
        preload("bg2-main.png"),
        preload("bg1-front.png"),
        preload("bg1-foreground.png"),
        preload("hallway.jpeg"),
        preload("torchtm.png")
      ]);
    }

    function setInitialState() {
      gsap.set(sky, {
        xPercent: -50,
        yPercent: -50,
        x: 0,
        y: 0,
        scale: 1.08,
        opacity: 1
      });

      gsap.set(mid, {
        xPercent: -50,
        yPercent: -50,
        x: 0,
        y: 0,
        scale: 1.12,
        opacity: 1
      });

      gsap.set(museum, {
        xPercent: -50,
        yPercent: -50,
        x: 0,
        y: 16,
        scale: 1.02,
        opacity: 1
      });

      gsap.set(front, {
        xPercent: -50,
        yPercent: -50,
        x: 0,
        y: 0,
        scale: 1.12,
        opacity: 1
      });

      gsap.set(foreground, {
        xPercent: -50,
        yPercent: -50,
        x: 0,
        y: 0,
        scale: 1.16,
        opacity: 1
      });

      gsap.set(hallway, {
        xPercent: -50,
        yPercent: -50,
        x: 0,
        y: 0,
        scale: 1.28,
        opacity: 1
      });

      gsap.set(root, {
        "--reveal": "0%"
      });
    }

    function playIntro() {
      const tl = gsap.timeline({
        defaults: { ease: "power2.out" },
        onComplete: () => {
          body.classList.remove("intro-active");
          darkness.style.pointerEvents = "none";
        }
      });

      tl.to({}, { duration: 1.9 });

      tl.to(darkness, {
        opacity: 0,
        duration: 1.2,
        ease: "power3.out"
      });

      tl.to(torch, {
        opacity: 0,
        duration: 0.8
      }, "-=0.95");
    }

    function buildScrollTimeline() {
      const tl = gsap.timeline({
        scrollTrigger: {
          trigger: ".scroll-wrap",
          start: "top top",
          end: "+=4200",
          scrub: 1,
          pin: ".pin-scene",
          anticipatePin: 1,
          invalidateOnRefresh: true
        }
      });

      /* PHASE 1: forward drift with layered depth */
      tl.to(sky, {
        y: -35,
        scale: 1.13,
        ease: "none"
      }, 0);

      tl.to(mid, {
        y: -85,
        scale: 1.22,
        ease: "none"
      }, 0);

      tl.to(museum, {
        y: -24,
        scale: 1.14,
        ease: "none"
      }, 0);

      tl.to(front, {
        y: -150,
        x: -18,
        scale: 1.28,
        ease: "none"
      }, 0);

      tl.to(foreground, {
        y: -250,
        x: 28,
        scale: 1.44,
        ease: "none"
      }, 0);

      /* PHASE 2: approach the museum harder */
      tl.to(sky, {
        y: -70,
        scale: 1.18,
        ease: "none"
      }, 1);

      tl.to(mid, {
        y: -170,
        scale: 1.34,
        ease: "none"
      }, 1);

      tl.to(museum, {
        y: -80,
        scale: 1.46,
        ease: "none"
      }, 1);

      tl.to(front, {
        y: -320,
        x: -56,
        scale: 1.58,
        opacity: 0.72,
        ease: "none"
      }, 1);

      tl.to(foreground, {
        y: -500,
        x: 84,
        scale: 1.9,
        opacity: 0.22,
        ease: "none"
      }, 1);

      /* PHASE 3: clear front obstruction, center the entrance */
      tl.to(front, {
        y: -560,
        x: -95,
        scale: 1.84,
        opacity: 0,
        ease: "none"
      }, 2);

      tl.to(foreground, {
        y: -820,
        x: 140,
        scale: 2.3,
        opacity: 0,
        ease: "none"
      }, 2);

      tl.to(mid, {
        y: -250,
        scale: 1.48,
        opacity: 0.96,
        ease: "none"
      }, 2);

      tl.to(museum, {
        y: -140,
        scale: 1.9,
        ease: "none"
      }, 2);

      /* PHASE 4: doorway reveal starts small and stays doorway-locked */
      tl.to(root, {
        "--reveal": "4%",
        ease: "none"
      }, 3.0);

      tl.to(museum, {
        scale: 2.08,
        y: -155,
        ease: "none"
      }, 3.0);

      tl.to(root, {
        "--reveal": "10%",
        ease: "none"
      }, 3.35);

      tl.to(hallway, {
        scale: 1.18,
        ease: "none"
      }, 3.35);

      tl.to(root, {
        "--reveal": "18%",
        ease: "none"
      }, 3.7);

      tl.to(museum, {
        scale: 2.24,
        y: -168,
        ease: "none"
      }, 3.7);

      tl.to(root, {
        "--reveal": "32%",
        ease: "none"
      }, 4.05);

      tl.to(hallway, {
        scale: 1.08,
        ease: "none"
      }, 4.05);

      tl.to(root, {
        "--reveal": "54%",
        ease: "none"
      }, 4.45);

      tl.to(museum, {
        scale: 2.36,
        y: -176,
        ease: "none"
      }, 4.45);

      /* PHASE 5: hallway takes over only after strong reveal */
      tl.to(root, {
        "--reveal": "120%",
        ease: "none"
      }, 5.0);

      tl.to(hallway, {
        scale: 1.0,
        ease: "none"
      }, 5.0);

      tl.to([museum, mid, sky], {
        opacity: 0,
        ease: "none"
      }, 5.05);

      /* PHASE 6: fully inside */
      tl.to(hallway, {
        scale: 1.05,
        y: -12,
        ease: "none"
      }, 5.7);

      tl.to(hallway, {
        scale: 1.08,
        y: -24,
        ease: "none"
      }, 6.4);
    }

    function onResize() {
      ScrollTrigger.refresh();
    }

    window.addEventListener("resize", onResize);

    async function init() {
      await preloadAll();
      setInitialState();
      renderTorch();
      playIntro();
      buildScrollTimeline();
      ScrollTrigger.refresh();
    }

    init();
  </script>
</body>
</html>
