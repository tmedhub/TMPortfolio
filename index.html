<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museum Experience</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<style>
body{
  margin:0;
  background:#000;
  overflow-x:hidden;
  font-family:sans-serif;
}

/* ================= SCENE ================= */
.scene1-wrapper{
  position:relative;
  height:100vh;
  overflow:hidden;
}

/* smooth fade to canvas */
.scene1-wrapper::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:25vh;
  background:linear-gradient(to bottom, transparent, #000);
  z-index:10;
}

.layer{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ================= TORCH ================= */
#darkness{
  position:absolute;
  inset:0;
  background:black;
  z-index:50;
  pointer-events:none;
  mask-image:radial-gradient(circle at var(--x,50%) var(--y,50%), transparent 120px, black 300px);
}

#torch{
  position:absolute;
  width:70px;
  transform:translate(-50%,-50%);
  z-index:60;
}

/* ================= CANVAS ================= */
.canvas-wrap{
  height:100vh;
  margin-top:-10vh;
  padding-top:10vh;
  background:#000;
  position:relative;
}

#freeform{
  position:absolute;
  inset:0;
}

.freeform-inner img{
  position:absolute;
  width:260px;
  opacity:0;
}

/* ================= ARCADE ================= */
.bg4-stage{
  position:relative;
  height:100vh;
  overflow:hidden;
}

.bg4-base,.bg5-top,.bg6{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
}

.bg4-base{background:url("bg4.jpeg");}
.bg5-top{background:url("bg5.png"); opacity:0;}
.bg6{background:url("bg6.PNG");}

#arcadeFade{
  position:absolute;
  inset:0;
  background:#000;
  opacity:0;
  z-index:5;
}

.projects{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  gap:60px;
  padding:0 10vw;
  opacity:0;
  background:#000;
}

.project{
  min-width:70vw;
  height:60vh;
  background:#111;
  border:1px solid #d7b675;
  color:#fff;
  padding:40px;
}
</style>
</head>

<body>

<!-- ================= SCENE ================= -->
<section class="scene1-wrapper" id="scene1">
  <img src="bg1-sky.png" class="layer" id="sky">
  <img src="bg1-mid.png" class="layer" id="mid">
  <img src="bg1-front.PNG" class="layer" id="front">
  <img src="bg1-foreground.PNG" class="layer" id="foreground">
  <img src="bg2-main.png" class="layer" id="bg2">

  <div id="darkness"></div>
  <img src="torchtm.png" id="torch">
</section>

<!-- ================= CANVAS ================= -->
<section class="canvas-wrap" id="canvasStudio">
  <div id="freeform">
    <div class="freeform-inner" id="inner"></div>
  </div>
</section>

<!-- ================= ARCADE ================= -->
<section class="bg4-stage" id="projectArcade">
  <div class="bg4-base" id="bg4Base"></div>
  <div class="bg5-top" id="bg5Top"></div>

  <div id="arcadeFade"></div>

  <div class="projects" id="projects">
    <div class="project">Clay Creation</div>
    <div class="project">Board Games</div>
    <div class="project">Events Hosted</div>
    <div class="project">Interactive Work</div>
  </div>
</section>

<section class="bg6"></section>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ================= TORCH ================= */
document.addEventListener("mousemove", e=>{
  document.documentElement.style.setProperty("--x", e.clientX+"px");
  document.documentElement.style.setProperty("--y", e.clientY+"px");

  torch.style.left=e.clientX+"px";
  torch.style.top=e.clientY+"px";
});

setTimeout(()=>{
  gsap.to("#darkness",{opacity:0,duration:2});
  gsap.to("#torch",{opacity:0,duration:2});
},4000);

/* ================= SCENE ================= */
gsap.timeline({
  scrollTrigger:{
    trigger:"#scene1",
    start:"top top",
    end:"+=2000",
    scrub:1,
    pin:true
  }
})
.to("#sky",{y:30},0)
.to("#mid",{y:60},0)
.to("#front",{y:90},0)
.to("#foreground",{y:120},0)
.to("#bg2",{opacity:1},0.4);

/* ================= CANVAS ================= */
const inner=document.getElementById("inner");
let frames=[],posX=0,velX=0;

function place(f){
  f.x=Math.random()*2000-1000;
  f.y=Math.random()*2000-1000;
}

function build(){
  for(let i=0;i<8;i++){
    const img=document.createElement("img");
    img.src=`art${i+1}.png`;
    inner.appendChild(img);

    const f={img,x:0,y:0,opacity:0};
    place(f);
    frames.push(f);
  }
  loop();
}

function loop(){
  posX+=velX;
  velX*=0.92;

  frames.forEach(f=>{
    const x=f.x+posX;
    const y=f.y;

    const visible = x>-200 && x<window.innerWidth+100;

    const target=visible?1:0;
    f.opacity += (target-f.opacity)*0.08;

    if(Math.abs(x)>1200){
      place(f);
      f.opacity=0;
    }

    f.img.style.left=x+"px";
    f.img.style.top=y+"px";
    f.img.style.opacity=f.opacity;
  });

  requestAnimationFrame(loop);
}

ScrollTrigger.create({
  trigger:"#canvasStudio",
  start:"top top",
  onEnter:build
});

/* ================= ARCADE ================= */
gsap.timeline({
  scrollTrigger:{
    trigger:"#projectArcade",
    start:"top top",
    end:"+=4200",
    scrub:1.2,
    pin:true
  }
})

/* bg4 → bg5 */
.to("#bg4Base",{scale:1.1},0)
.to("#bg5Top",{opacity:1},0.2)

/* zoom into screen */
.to("#bg5Top",{
  scale:2.8,
  xPercent:22,
  yPercent:8
},0.5)

/* enter machine */
.to("#arcadeFade",{opacity:1},0.6)
.to("#bg5Top",{opacity:0},0.62)

/* horizontal world */
.to("#projects",{opacity:1},0.65)
.to("#projects",{
  x:()=>-(projects.scrollWidth-window.innerWidth)
},0.7)

/* exit */
.to("#projects",{opacity:0},0.95)
.to("#arcadeFade",{opacity:0},0.98);

</script>
</body>
</html>
