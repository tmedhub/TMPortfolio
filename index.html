<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beat 1 — Correct Handoff</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    :root{
      --x:50%;
      --y:50%;
      --torchW:420px;
      --torchH:620px;
      --gold:#f5d9a6;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html,body{background:#000;color:#f5d9a6;font-family:Georgia, serif;overflow-x:hidden}
    body.lock-scroll, html.lock-scroll{overflow:hidden;height:100%;touch-action:none}

    .top-btn{
      position:fixed;top:18px;z-index:200;
      display:inline-flex;align-items:center;gap:.8rem;
      padding:.9rem 1.1rem;border-radius:999px;
      border:1px solid rgba(245,217,166,.28);
      background:rgba(0,0,0,.26);
      color:var(--gold);backdrop-filter:blur(14px);
      letter-spacing:.14em;text-transform:uppercase;font-size:.72rem;
    }
    .menu-toggle{left:18px}
    .work-toggle{right:18px}

    .burger{display:grid;gap:4px}
    .burger span{display:block;width:18px;height:1.5px;background:currentColor}

    /* SINGLE PIN CONTAINER */
    #hero{
      height:200vh;
      cursor:none;
    }

    .hero-pin{
      position:sticky;
      top:0;
      height:100vh;
      overflow:hidden;
    }

    /* bg2 UNDER */
    #bg2{
      position:absolute;
      inset:0;
      background:url("bg2.jpeg") center center/cover no-repeat;
      z-index:1;
      transform:scale(1.08);
      will-change:transform;
    }

    /* bg1 TOP */
    #bg1{
      position:absolute;
      inset:0;
      background:url("bg1.png") center bottom/cover no-repeat;
      z-index:2;
      transform-origin:center center;
      will-change:transform, opacity;
    }

    #darkness{
      position:absolute;inset:0;background:black;z-index:3;
      mask-image:radial-gradient(var(--torchW) var(--torchH) at var(--x) var(--y),transparent 0%,rgba(0,0,0,.25) 35%,black 65%);
      -webkit-mask-image:radial-gradient(var(--torchW) var(--torchH) at var(--x) var(--y),transparent 0%,rgba(0,0,0,.25) 35%,black 65%);
      transition:opacity 2s ease;
    }

    #torch{
      position:absolute;width:70px;z-index:4;
      transform:translate(-50%,-15%) rotate(-20deg);
      pointer-events:none;
    }
  </style>
</head>
<body>

  <button class="top-btn menu-toggle">
    <span class="burger"><span></span><span></span><span></span></span>
    <span>Museum’s Galleries</span>
  </button>

  <button class="top-btn work-toggle">Let’s Work Together</button>

  <section id="hero">
    <div class="hero-pin">
      <div id="bg2"></div>
      <div id="bg1"></div>
      <div id="darkness"></div>
      <img id="torch" src="torchtm.png" />
    </div>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const root=document.documentElement;
    const torch=document.getElementById("torch");
    const dark=document.getElementById("darkness");

    // HARD SCROLL LOCK
    const prevent=(e)=>{e.preventDefault();window.scrollTo(0,0)};
    window.addEventListener("wheel",prevent,{passive:false});
    window.addEventListener("touchmove",prevent,{passive:false});

    document.addEventListener("mousemove",e=>{
      root.style.setProperty("--x",e.clientX+"px");
      root.style.setProperty("--y",e.clientY+"px");
      torch.style.left=e.clientX+"px";
      torch.style.top=e.clientY+"px";
    });

    setTimeout(()=>{
      dark.style.opacity=0;
      torch.style.opacity=0;
      document.body.style.cursor="auto";

      window.removeEventListener("wheel",prevent);
      window.removeEventListener("touchmove",prevent);

      ScrollTrigger.refresh();
    },2500);

    // PERFECT HANDOFF TIMELINE
    gsap.timeline({
      scrollTrigger:{
        trigger:"#hero",
        start:"top top",
        end:"bottom bottom",
        scrub:1
      }
    })
    .to("#bg1",{
      scale:1.3,
      yPercent:8,
      ease:"none"
    },0)
    .to("#bg1",{
      opacity:0,
      ease:"none"
    },0.7)
    .to("#bg2",{
      scale:1,
      ease:"none"
    },0);

  </script>
</body>
</html>
