<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scene 1</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold-1:#f6ead2;
      --gold-2:#ead7ae;
      --gold-3:#d7b675;
      --text:#f7f1e7;
      --bg:#050505;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      background:var(--bg);
    }

    body{
      font-family:"Inter",sans-serif;
      color:var(--text);
    }

    .scene1-wrapper{
      position:relative;
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      isolation:isolate;
    }

    .scene{
      position:absolute;
      inset:0;
    }

    .layer{
      position:absolute;
      pointer-events:none;
    }

    /* SKY */
    .sky{
      z-index:1;
      top:-6%;
      left:-4%;
      width:108%;
      height:112%;
      object-fit:cover;
    }

    /* MID */
    .mid{
      z-index:2;
      top:-8%;
      left:-5%;
      width:112%;
      height:122%;
      object-fit:cover;
    }

    /* 🔥 FIXED FRONT (FULL WIDTH) */
    .front{
      z-index:3;

      position:absolute;
      left:0;
      bottom:0;

      width:100%;
      height:auto;

      object-fit:contain;
      object-position:center bottom;

      transform-origin:center bottom;
    }

    /* 🔥 BIG FOREGROUND */
    .foreground{
      position:absolute;
      z-index:4;

      width:80vw;
      max-width:1400px;

      left:-5%;
      bottom:-2%;

      height:auto;

      transform-origin:left bottom;
      transform:scale(1.05);

      filter:
        brightness(1.1)
        contrast(1.06)
        saturate(1.02)
        drop-shadow(0 20px 40px rgba(0,0,0,0.45));
    }

    .bg2{
      z-index:5;
      top:-4%;
      left:-3%;
      width:106%;
      height:110%;
      object-fit:cover;
      opacity:0;
      transform:scale(1.04);
    }

    .bg2-content{
      position:absolute;
      z-index:6;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      text-align:center;
      opacity:0;
    }

    .bg2-content h1{
      font-family:"Cormorant Garamond", serif;
      font-size:clamp(2.6rem, 5.4vw, 4.8rem);

      background:linear-gradient(
        120deg,
        #fffdf9,
        #f6eddc,
        #ead7ae,
        #d7b675
      );
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .bg2-content p{
      margin-top:1rem;
      font-size:1rem;
      color:rgba(250,246,239,0.9);
    }

  </style>
</head>
<body>

<section class="scene1-wrapper" id="scene1">

  <div class="scene">
    <img src="bg1-sky.png" class="layer sky" id="sky">
    <img src="bg1-mid.png" class="layer mid" id="mid">
    <img src="bg1-front.png" class="layer front" id="front">
    <img src="bg1-foreground.png" class="foreground" id="foreground">
  </div>

  <div class="scene">
    <img src="bg2-main.png" class="layer bg2" id="bg2">

    <div class="bg2-content" id="bg2Content">
      <h1>Hey there, Welcome!!</h1>
      <p>Step into my little world of creations</p>
    </div>
  </div>

</section>

<script>
gsap.registerPlugin(ScrollTrigger);

const tl = gsap.timeline({
  scrollTrigger:{
    trigger:"#scene1",
    start:"top top",
    end:"+=3200",
    scrub:1.6,
    pin:true
  }
});

tl.to("#sky",{y:30,scale:1.02},0)
  .to("#mid",{y:50,scale:1.03},0)
  .to("#front",{y:70,scale:1.02},0)
  .to("#foreground",{y:120,scale:1.08},0)

  .to("#bg2",{opacity:1},0.6)
  .to("#bg2Content",{opacity:1},0.75)

  .to("#foreground",{opacity:0},0.7)
  .to("#mid",{opacity:0},0.75)
  .to("#front",{opacity:0},0.8)
  .to("#sky",{opacity:0.2},0.85);
</script>

</body>
</html>
