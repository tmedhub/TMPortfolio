<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C1inematic Museum Portfolio - Scene 1</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    body {
      background: #000;
    }

    .scene1-wrapper {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .layer {
      position: absolute;
      display: block;
      will-change: transform, opacity;
      pointer-events: none;
      user-select: none;
      max-width: none;
    }

    /* SKY: oversize so no black gap appears during movement */
    .sky {
      z-index: 1;
      top: -8%;
      left: -4%;
      width: 108%;
      height: 116%;
      object-fit: cover;
    }

    /* FRONT: half-ish size, moved upward */
    .front {
      z-index: 2;
      width: 52vw;
      max-width: 900px;
      min-width: 480px;
      height: auto;
      left: 50%;
      top: 10%;
      transform: translateX(-50%);
      transform-origin: center center;
    }

    /* FOREGROUND: half-ish size, aligned left */
    .foreground {
      z-index: 3;
      width: 46vw;
      max-width: 760px;
      min-width: 320px;
      height: auto;
      left: 0;
      bottom: -2%;
      transform-origin: left bottom;
    }

    /* BG2 should fill fully */
    .bg2 {
      z-index: 4;
      top: -3%;
      left: -3%;
      width: 106%;
      height: 110%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.06);
    }

    .overlay-gradient {
      position: absolute;
      inset: 0;
      z-index: 5;
      background:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.02) 0%,
          rgba(0, 0, 0, 0.04) 35%,
          rgba(0, 0, 0, 0.12) 70%,
          rgba(0, 0, 0, 0.22) 100%
        );
      pointer-events: none;
    }

    .bg2-title {
      position: absolute;
      z-index: 6;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 90%;
      max-width: 900px;
      opacity: 0;
      pointer-events: none;
    }

    .bg2-title h1 {
      font-size: clamp(2.2rem, 6vw, 5.2rem);
      line-height: 1.05;
      font-weight: 700;
      color: #fff;
      text-shadow:
        0 8px 30px rgba(0, 0, 0, 0.4),
        0 2px 8px rgba(0, 0, 0, 0.35);
    }

    .debug-note {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 99;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.85;
    }

    .after-section {
      min-height: 100vh;
      background: #0b0b0b;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    .after-section .content {
      max-width: 800px;
    }

    .after-section h2 {
      font-size: clamp(2rem, 5vw, 4rem);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .after-section p {
      font-size: 1.05rem;
      line-height: 1.7;
      opacity: 0.8;
    }

    @media (max-width: 900px) {
      .front {
        width: 70vw;
        min-width: 0;
        top: 15%;
      }

      .foreground {
        width: 58vw;
        min-width: 0;
      }

      .bg2-title h1 {
        font-size: clamp(2rem, 8vw, 4rem);
      }
    }

    @media (max-width: 600px) {
      .scene1-wrapper {
        height: 100svh;
      }

      .sky {
        top: -6%;
        left: -8%;
        width: 116%;
        height: 114%;
      }

      .front {
        width: 82vw;
        top: 18%;
      }

      .foreground {
        width: 70vw;
        bottom: 0;
      }
    }
  </style>
</head>
<body>

  <div class="debug-note">Scene 1</div>

  <section class="scene1-wrapper" id="scene1">
    <div class="scene scene1-exterior">
      <img src="bg1-sky.png" alt="Sky background" class="layer sky" id="sky" />
      <img src="bg1-front.png" alt="Museum front" class="layer front" id="front" />
      <img src="bg1-foreground.png" alt="Foreground left" class="layer foreground" id="foreground" />
      <div class="overlay-gradient"></div>
    </div>

    <div class="scene scene2-preview">
      <img src="bg2-main.png" alt="Museum interior" class="layer bg2" id="bg2" />
      <div class="bg2-title" id="bg2Title">
        <h1>Hey there, Welcome!!</h1>
      </div>
    </div>
  </section>

  <section class="after-section">
    <div class="content">
      <h2>Scene 2 begins here</h2>
      <p>
        Replace this with your artwork canvas section next.
      </p>
    </div>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const sky = document.getElementById("sky");
    const front = document.getElementById("front");
    const foreground = document.getElementById("foreground");
    const bg2 = document.getElementById("bg2");
    const bg2Title = document.getElementById("bg2Title");
    const scene1 = document.getElementById("scene1");

    gsap.set(sky, { y: 0, x: 0, scale: 1 });
    gsap.set(front, { y: 0, x: 0, scale: 1 });
    gsap.set(foreground, { y: 0, x: 0, scale: 1 });
    gsap.set(bg2, { y: 20, scale: 1.06, opacity: 0 });
    gsap.set(bg2Title, { y: 40, opacity: 0 });

    const tl = gsap.timeline({
      defaults: { ease: "none" },
      scrollTrigger: {
        trigger: scene1,
        start: "top top",
        end: "+=3200",
        scrub: 1.4,
        pin: true,
        anticipatePin: 1
      }
    });

    tl.to(sky, {
      y: 35,
      scale: 1.03
    }, 0)

    .to(front, {
      y: 60,
      scale: 1.04
    }, 0)

    .to(foreground, {
      y: 120,
      x: -10,
      scale: 1.05
    }, 0)

    .to(front, {
      y: 110,
      scale: 1.08,
      opacity: 0.92
    }, 0.35)

    .to(foreground, {
      y: 220,
      x: -20,
      scale: 1.08,
      opacity: 0.75
    }, 0.4)

    .to(bg2, {
      opacity: 1,
      scale: 1,
      y: 0
    }, 0.58)

    .to(bg2Title, {
      opacity: 1,
      y: 0
    }, 0.72)

    .to(front, {
      opacity: 0
    }, 0.76)

    .to(foreground, {
      opacity: 0
    }, 0.7)

    .to(sky, {
      opacity: 0.18
    }, 0.82);
  </script>

</body>
</html>
