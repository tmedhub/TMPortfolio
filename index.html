<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Museumof Me</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold-1:#f6ead2;
      --gold-2:#ead7ae;
      --gold-3:#d7b675;
      --text:#f7f1e7;
      --bg:#050505;

      --x:50%;
      --y:50%;
      --torchW:320px;
      --torchH:480px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      background:var(--bg);
      scroll-behavior:smooth;
    }

    body{
      font-family:"Inter",sans-serif;
      color:var(--text);
      background:#050505;
      cursor:none;
    }

    body.scroll-locked{
      overflow:hidden;
      touch-action:none;
    }

    body.torch-ended{
      cursor:auto;
    }

    .scene1-wrapper{
      position:relative;
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      isolation:isolate;
    }

    .scene{
      position:absolute;
      inset:0;
    }

    .layer{
      position:absolute;
      pointer-events:none;
      user-select:none;
      will-change:transform, opacity, filter;
    }

    .sky{
      z-index:1;
      top:-6%;
      left:-4%;
      width:108%;
      height:112%;
      object-fit:cover;
    }

    .mid{
      z-index:2;
      top:-8%;
      left:-5%;
      width:112%;
      height:122%;
      object-fit:cover;
    }

    .front{
      z-index:3;
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      height:auto;
      object-fit:contain;
      object-position:center bottom;
      transform-origin:center bottom;
      filter:none;
      opacity:1;
    }

    .foreground{
      position:absolute;
      z-index:4;
      width:72vw;
      max-width:1280px;
      min-width:520px;
      left:0;
      bottom:0;
      height:auto;
      transform-origin:left bottom;
      transform:scale(1.02);
      filter:
        brightness(1.02)
        contrast(0.98)
        saturate(0.94)
        drop-shadow(0 14px 28px rgba(0,0,0,0.32));
    }

    .bg2{
      z-index:5;
      top:-4%;
      left:-3%;
      width:106%;
      height:110%;
      object-fit:cover;
      opacity:0;
      transform:scale(1.02);
    }

    .bg2-content{
      position:absolute;
      z-index:6;
      left:50%;
      top:44%;
      transform:translate(-50%, -50%);
      width:min(92vw, 960px);
      text-align:center;
      opacity:0;
      pointer-events:none;
      will-change:transform, opacity;
    }

    .text-plate{
      position:absolute;
      inset:-18px -22px;
      z-index:1;
      background:rgba(255,255,255,0.015);
      border:1px solid rgba(255,255,255,0.03);
      border-radius:30px;
      opacity:1;
      box-shadow:none;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }

    .bg2-content h1{
      position:relative;
      z-index:2;
      font-family:"Cormorant Garamond", serif;
      font-size:clamp(2.5rem, 5.2vw, 4.6rem);
      font-weight:600;
      line-height:1.05;
      letter-spacing:0.01em;
      white-space:nowrap;
      background:linear-gradient(
        120deg,
        #fffdf9 0%,
        #f6eddc 38%,
        #ead7ae 70%,
        #d7b675 100%
      );
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:
        0 2px 10px rgba(0,0,0,0.32),
        0 10px 28px rgba(0,0,0,0.24);
    }

    .gold-line{
      position:relative;
      z-index:2;
      width:120px;
      height:1px;
      margin:1rem auto 0.95rem;
      background:linear-gradient(
        to right,
        transparent,
        rgba(236,221,184,0.95),
        transparent
      );
      opacity:0.95;
    }

    .bg2-content p{
      position:relative;
      z-index:2;
      margin-top:0;
      font-size:1rem;
      line-height:1.6;
      color:rgba(250,246,239,0.92);
      letter-spacing:0.02em;
      text-shadow:0 2px 10px rgba(0,0,0,0.22);
    }

    #darkness{
      position:absolute;
      inset:0;
      background:black;
      pointer-events:none;
      z-index:50;
      mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      -webkit-mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      transition:opacity 2.2s ease;
    }

    #torch{
      position:absolute;
      width:70px;
      pointer-events:none;
      transform:translate(-50%,-15%) rotate(-20deg);
      z-index:60;
      transition:opacity 2.2s ease;
    }

    .canvas-wrap{
      position:relative;
      height:100vh;
      background:black;
      overflow:hidden;
    }

    #freeform{
      position:absolute;
      inset:0;
      background:black;
      overflow:hidden;
      cursor:default;
      z-index:100;
    }

    body.torch-ended #freeform{
      cursor:grab;
    }

    body.torch-ended #freeform:active,
    body.torch-ended #freeform.is-dragging{
      cursor:grabbing;
    }

    .freeform-inner{
      position:absolute;
      left:0;
      top:0;
    }

    .freeform-inner img{
      position:absolute;
      width:280px;
      opacity:1;
      box-shadow:0 30px 80px rgba(0,0,0,.95);
      z-index:20;
      pointer-events:none;
      user-select:none;
    }

    .freeform-title{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      pointer-events:none;
      z-index:5;
      text-align:center;
    }

    .freeform-title h1{
      font-size:3.4rem;
      letter-spacing:.35em;
      opacity:.45;
      color:#f5d9a6;
      font-family:"Cormorant Garamond", serif;
      text-transform:uppercase;
    }

    .freeform-title p{
      margin-top:14px;
      opacity:.35;
      letter-spacing:.18em;
      color:#f5d9a6;
      text-transform:uppercase;
      font-size:.9rem;
    }

    .bg4-section{
      position:relative;
      min-height:100vh;
      background:url("bg5.png") center center/cover no-repeat;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      transform:scale(1.06);
      transform-origin:center center;
      will-change:transform, opacity, filter;
    }

    .bg4-section::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:180px;
      z-index:1;
      pointer-events:none;
      background:linear-gradient(
        to bottom,
        #000 0%,
        rgba(0,0,0,0.88) 14%,
        rgba(0,0,0,0.62) 38%,
        rgba(0,0,0,0.26) 66%,
        rgba(0,0,0,0) 100%
      );
    }

    .bg4-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.14),
        rgba(0,0,0,0.26)
      );
    }

    @media (max-width: 900px){
      .foreground{
        width:82vw;
        min-width:0;
      }
    }

    @media (max-width: 768px){
      .scene1-wrapper,
      .canvas-wrap{
        height:100svh;
      }

      .foreground{
        width:92vw;
      }

      .bg2-content{
        top:42%;
      }

      .bg2-content h1{
        font-size:clamp(2rem, 8vw, 3rem);
        white-space:normal;
      }

      .text-plate{
        inset:-14px -14px;
        border-radius:22px;
      }

      .bg2-content p{
        font-size:0.92rem;
      }

      .freeform-inner img{
        width:220px;
      }

      .freeform-title h1{
        font-size:2.2rem;
        letter-spacing:.14em;
      }

      .freeform-title p{
        font-size:.78rem;
      }

      #torch{
        width:56px;
      }
    }
  </style>
</head>
<body class="scroll-locked">

  <section class="scene1-wrapper" id="scene1">
    <div class="scene">
      <img src="bg1-sky.png" class="layer sky" id="sky" alt="sky">
      <img src="bg1-mid.png" class="layer mid" id="mid" alt="mid">
      <img src="bg1-front.PNG" class="layer front" id="front" alt="front">
      <img src="bg1-foreground.PNG" class="foreground" id="foreground" alt="foreground">

      <div id="darkness"></div>
      <img id="torch" src="torchtm.png" alt="torch">
    </div>

    <div class="scene">
      <img src="bg2-main.png" class="layer bg2" id="bg2" alt="bg2">

      <div class="bg2-content" id="bg2Content">
        <div class="text-plate"></div>
        <h1>Hey there, Welcome!!</h1>
        <div class="gold-line"></div>
        <p>Step into my little world of creations</p>
      </div>
    </div>
  </section>

  <section class="canvas-wrap" id="canvasWrap">
    <div id="freeform">
      <div class="freeform-title">
        <h1>Canvas Studio</h1>
        <p>Drag & Explore :)</p>
      </div>
      <div class="freeform-inner" id="freeformInner"></div>
    </div>
  </section>

  <section class="bg4-section" id="bg4Section">
    <div class="bg4-overlay"></div>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    let torchActive = true;
    let canvasUnlocked = true;
    let introComplete = false;

    function lockPageScroll() {
      document.body.classList.add("scroll-locked");
    }

    function unlockPageScroll() {
      document.body.classList.remove("scroll-locked");
    }

    function preventScroll(e) {
      if (!introComplete || torchActive || !canvasUnlocked) {
        e.preventDefault();
      }
    }

    function keyBlocker(e) {
      const blocked = ["Space","ArrowUp","ArrowDown","PageUp","PageDown","Home","End"];
      if ((!introComplete || torchActive || !canvasUnlocked) && blocked.includes(e.code)) {
        e.preventDefault();
      }
    }

    window.addEventListener("wheel", preventScroll, { passive:false });
    window.addEventListener("touchmove", preventScroll, { passive:false });
    window.addEventListener("keydown", keyBlocker, { passive:false });

    const root = document.documentElement;
    const torch = document.getElementById("torch");
    const darkness = document.getElementById("darkness");

    document.addEventListener("mousemove", e => {
      root.style.setProperty("--x", e.clientX + "px");
      root.style.setProperty("--y", e.clientY + "px");

      if (torchActive) {
        torch.style.left = e.clientX + "px";
        torch.style.top = e.clientY + "px";
      }
    });

    setTimeout(() => {
      darkness.style.opacity = 0;
      torch.style.opacity = 0;

      setTimeout(() => {
        torchActive = false;
        introComplete = true;
        document.body.classList.add("torch-ended");
        unlockPageScroll();
        darkness.style.display = "none";
        torch.style.display = "none";
      }, 2200);
    }, 5000);

    const tl = gsap.timeline({
      scrollTrigger:{
        trigger:"#scene1",
        start:"top top",
        end:"+=2200",
        scrub:1.2,
        pin:true
      }
    });

    tl.to("#sky",{ y:22, scale:1.015 },0)
      .to("#mid",{ y:36, scale:1.02 },0)
      .to("#front",{ y:42, scale:1.015 },0)
      .to("#foreground",{ y:78, scale:1.045, x:0 },0)
      .to("#bg2",{ opacity:1, scale:1, duration:0.8, ease:"power2.out" },0.42)
      .to("#bg2Content",{ opacity:1, y:-1, duration:0.55, ease:"power1.out" },0.48)
      .to("#foreground",{ opacity:0 },0.52)
      .to("#mid",{ opacity:0 },0.58)
      .to("#front",{ opacity:0 },0.62)
      .to("#sky",{ opacity:0.14 },0.68);

    const freeform = document.getElementById("freeform");
    const inner = document.getElementById("freeformInner");
    const canvasWrap = document.getElementById("canvasWrap");

    let canvasBuilt = false;
    let canvasTimerStarted = false;
    let frames = [];
    let posX = 0, posY = 0, velX = 0, velY = 0;
    let dragging = false;

    function place(frame, range, minDist){
      let x, y, ok = false;
      while(!ok){
        x = Math.random() * range - range / 2;
        y = Math.random() * range - range / 2;
        ok = frames.every(f => Math.hypot(f.x - x, f.y - y) > minDist || f === frame);
      }
      frame.x = x;
      frame.y = y;
    }

    function buildFreeform(){
      if (canvasBuilt) return;
      canvasBuilt = true;

      inner.innerHTML = "";
      frames = [];

      const COUNT = 8;
      const RANGE = 2400;
      const MIN_DIST = 360;
      const imgs = [...Array(8)].map((_,i)=>`art${i+1}.png`);

      for(let i=0;i<COUNT;i++){
        const img = document.createElement("img");
        img.src = imgs[i];
        img.alt = `Artwork ${i+1}`;
        inner.appendChild(img);

        const frame = { img, x:0, y:0 };
        place(frame, RANGE, MIN_DIST);
        frames.push(frame);
      }

      freeform.onmousedown = () => {
        dragging = true;
        freeform.classList.add("is-dragging");
      };

      window.addEventListener("mouseup", () => {
        dragging = false;
        freeform.classList.remove("is-dragging");
      });

      window.addEventListener("mousemove", e => {
        if (dragging) {
          velX += e.movementX * 0.12;
          velY += e.movementY * 0.12;
        }
      });

      (function loop(){
        if (!dragging) velX += 0.02;

        posX += velX;
        posY += velY;
        velX *= 0.92;
        velY *= 0.92;

        frames.forEach(f => {
          if (
            f.x + posX > 1400 || f.x + posX < -1400 ||
            f.y + posY > 1400 || f.y + posY < -1400
          ) {
            place(f, RANGE, MIN_DIST);
          }

          f.img.style.left = (f.x + posX) + "px";
          f.img.style.top = (f.y + posY) + "px";
        });

        requestAnimationFrame(loop);
      })();
    }

    ScrollTrigger.create({
      trigger: canvasWrap,
      start: "top top",
      onEnter: () => {
        buildFreeform();

        if (!canvasTimerStarted) {
          canvasTimerStarted = true;
          canvasUnlocked = false;
          lockPageScroll();

          setTimeout(() => {
            canvasUnlocked = true;
            unlockPageScroll();
          }, 8000);
        }
      }
    });

    gsap.fromTo("#bg4Section",
      {
        opacity: 0.96,
        scale: 1.06,
        filter: "blur(3px)"
      },
      {
        opacity: 1,
        scale: 1,
        filter: "blur(0px)",
        ease: "power2.out",
        scrollTrigger: {
          trigger: "#bg4Section",
          start: "top bottom",
          end: "top 35%",
          scrub: 1.2
        }
      }
    );
  </script>
</body>
</html>
