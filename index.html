<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museum</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<style>
body { margin:0; overflow-x:hidden; background:black; color:white; }
section { height:100vh; position:relative; }

/* simple placeholders */
#bg4Base, #bg5Top {
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
}
#bg4Base { background:#111; }
#bg5Top { background:#222; opacity:0; }

#projectsJourney {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  overflow:hidden;
  opacity:0;
  cursor:grab;
}
#projectsJourney.dragging { cursor:grabbing; }

#projectsTrack {
  display:flex;
  gap:4vw;
  padding:0 10vw;
}

.proj {
  min-width:70vw;
  height:60vh;
  background:#333;
  border:1px solid gold;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<section></section>
<section></section>

<!-- PROJECT ARCADE -->
<section id="projectArcade">

  <div id="bg4Base"></div>
  <div id="bg5Top"></div>

  <div id="projectsJourney">
    <div id="projectsTrack">
      <div class="proj">Project 1</div>
      <div class="proj">Project 2</div>
      <div class="proj">Project 3</div>
      <div class="proj">Project 4</div>
    </div>
  </div>

</section>

<section></section>

<script>
gsap.registerPlugin(ScrollTrigger);

const track = document.getElementById("projectsTrack");
const journey = document.getElementById("projectsJourney");

let trackX = 0;
let dragActive = false;
let startX = 0;
let startTrack = 0;

/* ========= DRAG ========= */

function clamp(x){
  const max = 0;
  const min = Math.min(0, journey.clientWidth - track.scrollWidth);
  return Math.max(min, Math.min(max, x));
}

function setX(x){
  trackX = clamp(x);
  gsap.set(track, { x: trackX });
}

journey.addEventListener("mousedown", e=>{
  dragActive = true;
  startX = e.clientX;
  startTrack = trackX;
  journey.classList.add("dragging");
});

window.addEventListener("mousemove", e=>{
  if(!dragActive) return;

  const dx = e.clientX - startX;
  const newX = startTrack + dx;
  setX(newX);

  const maxMove = track.scrollWidth - window.innerWidth;
  const progress = Math.abs(trackX) / maxMove;

  const st = ScrollTrigger.getById("arcade");

  if(st){
    st.scroll(st.start + progress * (st.end - st.start));
  }
});

window.addEventListener("mouseup", ()=>{
  dragActive = false;
  journey.classList.remove("dragging");
});

/* ========= SCROLL ========= */

const tl = gsap.timeline({
  scrollTrigger:{
    id:"arcade",
    trigger:"#projectArcade",
    start:"top top",
    end:"+=4000",
    scrub:1.2,
    pin:true,
    onUpdate:(self)=>{
      if(!dragActive){
        const maxMove = track.scrollWidth - window.innerWidth;
        trackX = -self.progress * maxMove;
        gsap.set(track,{ x:trackX });
      }
    }
  }
});

/* ========= TRANSITION ========= */

tl.fromTo("#bg4Base",
  {scale:1},
  {scale:1.1},
  0
)

.fromTo("#bg5Top",
  {opacity:0, scale:1.05},
  {opacity:1, scale:1},
  0.2
)

.to("#bg4Base",{opacity:0},0.35)

/* ========= ZOOM LEFT ========= */

.to("#bg5Top",{
  scale:3.6,
  xPercent:52,
  yPercent:-2,
  transformOrigin:"25% 45%",
  ease:"power2.inOut"
},0.45)

/* LOCK */
.to("#bg5Top",{
  scale:3.6,
  xPercent:52,
  yPercent:-2,
  transformOrigin:"25% 45%",
  ease:"none"
},0.6)

/* HOLD */
.to({}, {duration:0.4},0.65)

/* ENTER PROJECTS */
.to("#bg5Top",{opacity:0},0.72)
.to("#projectsJourney",{opacity:1},0.75)

/* EXIT */
.to("#projectsJourney",{opacity:0},0.95)

</script>

</body>
</html>
