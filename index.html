<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Museum Parallax</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <style>
    :root{
      --x: 50%;
      --y: 50%;
      --torchW: 420px;
      --torchH: 620px;
      --gold: #f5d9a6;
      --bg: #000;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      min-height:100%;
      background:var(--bg);
      color:var(--gold);
      font-family: Georgia, serif;
      overflow-x:hidden;
      scroll-behavior:smooth;
    }

    html.lock-scroll,
    body.lock-scroll{
      overflow:hidden !important;
      height:100%;
      touch-action:none;
    }

    button{
      font:inherit;
      color:inherit;
      border:none;
      background:none;
      cursor:pointer;
    }

    /* Top buttons */
    .top-btn{
      position:fixed;
      top:18px;
      z-index:1000;
      display:inline-flex;
      align-items:center;
      gap:.8rem;
      padding:.9rem 1.1rem;
      border-radius:999px;
      border:1px solid rgba(245,217,166,.28);
      background:rgba(0,0,0,.28);
      color:var(--gold);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      letter-spacing:.14em;
      text-transform:uppercase;
      font-size:.72rem;
      transition:transform .22s ease, background .22s ease, border-color .22s ease;
    }

    .top-btn:hover{
      transform:translateY(-2px);
      background:rgba(18,14,11,.55);
      border-color:rgba(245,217,166,.45);
    }

    .menu-toggle{ left:18px; }
    .work-toggle{ right:18px; }

    .burger{
      display:grid;
      gap:4px;
    }

    .burger span{
      display:block;
      width:18px;
      height:1.5px;
      background:currentColor;
      border-radius:999px;
    }

    .menu-panel{
      position:fixed;
      left:18px;
      top:68px;
      width:310px;
      padding:1.1rem 1.35rem 1.35rem;
      background:rgba(0,0,0,.98);
      z-index:1010;
      opacity:0;
      pointer-events:none;
      transform:translateY(-8px);
      transition:opacity .22s ease, transform .22s ease;
    }

    .menu-panel.open{
      opacity:1;
      pointer-events:auto;
      transform:translateY(0);
    }

    .menu-top{
      display:flex;
      justify-content:flex-end;
    }

    .menu-close{
      width:28px;
      height:28px;
      display:grid;
      place-items:center;
      color:var(--gold);
    }

    .menu-list{
      display:grid;
      gap:1.95rem;
      padding-top:.35rem;
    }

    .menu-link{
      width:100%;
      text-align:left;
    }

    .menu-link strong{
      display:block;
      font-size:1.08rem;
      font-weight:600;
    }

    .menu-link span{
      display:block;
      margin-top:.36rem;
      font-size:.72rem;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:rgba(245,217,166,.82);
    }

    /* Torch intro */
    #hero{
      position:relative;
      height:100vh;
      background:#000;
      overflow:hidden;
      cursor:none;
    }

    #scene{
      position:absolute;
      inset:0;
      background:url("bg1.png") center center / cover no-repeat;
      z-index:1;
      transform:scale(1.02);
    }

    #darkness{
      position:absolute;
      inset:0;
      background:black;
      pointer-events:none;
      z-index:10;
      mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      -webkit-mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      transition:opacity 1.8s ease;
    }

    #torch{
      position:absolute;
      width:70px;
      pointer-events:none;
      transform:translate(-50%,-15%) rotate(-20deg);
      z-index:20;
      transition:opacity .6s ease;
    }

    /* Main parallax section */
    #museum-sequence{
      position:relative;
      height:420vh;
      background:#000;
    }

    .sticky-scene{
      position:sticky;
      top:0;
      height:100vh;
      overflow:hidden;
      background:#000;
    }

    .layer{
      position:absolute;
      top:50%;
      left:50%;
      width:114vw;
      height:114vh;
      object-fit:cover;
      transform:translate(-50%, -50%) scale(1);
      will-change:transform, opacity, clip-path, filter;
      pointer-events:none;
      user-select:none;
    }

    .sky{ z-index:1; }
    .mid{ z-index:2; }
    .front{ z-index:3; }
    .foreground{ z-index:4; }

    .hall{
      z-index:5;
      opacity:0;
      transform:translate(-50%, -50%) scale(1.18);
      clip-path:ellipse(4% 7% at 50% 72%);
      filter:blur(10px);
    }

    .vignette{
      position:absolute;
      inset:0;
      z-index:9;
      pointer-events:none;
      background:
        radial-gradient(
          ellipse at center,
          rgba(0,0,0,0) 52%,
          rgba(0,0,0,.22) 100%
        );
    }

    /* Optional section after hallway reveal */
    #after-hallway{
      min-height:100vh;
      background:#120d09;
      display:grid;
      place-items:center;
      padding:4rem 1.5rem;
      text-align:center;
    }

    #after-hallway .inner{
      max-width:800px;
    }

    #after-hallway h2{
      font-size:clamp(2rem, 4vw, 4rem);
      margin-bottom:1rem;
      color:var(--gold);
    }

    #after-hallway p{
      font-size:1rem;
      line-height:1.7;
      color:rgba(245,217,166,.82);
    }

    @media (max-width: 720px){
      :root{
        --torchW: 260px;
        --torchH: 380px;
      }

      .top-btn{
        top:14px;
        font-size:.66rem;
        padding:.8rem .95rem;
      }

      .menu-toggle{ left:14px; }
      .work-toggle{ right:14px; }

      .menu-panel{
        top:62px;
        left:14px;
        width:min(310px, calc(100vw - 28px));
      }

      #torch{
        width:54px;
      }

      .layer{
        width:128vw;
        height:118vh;
      }

      .hall{
        clip-path:ellipse(6% 8% at 50% 72%);
      }
    }
  </style>
</head>
<body>
  <button class="top-btn menu-toggle" id="menuToggle">
    <span class="burger"><span></span><span></span><span></span></span>
    <span>Museum's Galleries</span>
  </button>

  <button class="top-btn work-toggle">Let's Work Together</button>

  <div class="menu-panel" id="menuPanel">
    <div class="menu-top">
      <button class="menu-close" id="menuClose">✕</button>
    </div>
    <div class="menu-list">
      <button class="menu-link"><strong>Canvas Studio</strong><span>Gallery 01</span></button>
      <button class="menu-link"><strong>Project Arcade</strong><span>Gallery 02</span></button>
      <button class="menu-link"><strong>Customization Co-op</strong><span>Gallery 03</span></button>
      <button class="menu-link"><strong>Director's Dome</strong><span>Gallery 04</span></button>
    </div>
  </div>

  <!-- Torch intro -->
  <section id="hero">
    <div id="scene"></div>
    <div id="darkness"></div>
    <img id="torch" src="torchtm.png" alt="Torch" />
  </section>

  <!-- Parallax sequence -->
  <section id="museum-sequence">
    <div class="sticky-scene">
      <!-- Replace with your actual layer files -->
      <img src="bg1-sky.png" class="layer sky" alt="" />
      <img src="bg1-mid.png" class="layer mid" alt="" />
      <img src="bg1-front.png" class="layer front" alt="" />
      <img src="bg1-foreground.png" class="layer foreground" alt="" />
      <img src="bg2-main.png" class="layer hall" alt="" />
      <div class="vignette"></div>
    </div>
  </section>

  <!-- Optional content after hallway -->
  <section id="after-hallway">
    <div class="inner">
      <h2>Inside the Museum</h2>
      <p>
        Continue with your gallery sections, cards, projects, or artwork here.
      </p>
    </div>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const root = document.documentElement;
    const body = document.body;

    const torch = document.getElementById("torch");
    const dark = document.getElementById("darkness");

    const menuToggle = document.getElementById("menuToggle");
    const menuPanel = document.getElementById("menuPanel");
    const menuClose = document.getElementById("menuClose");

    const wheelOpts = { passive: false };

    function preventScroll(e){
      e.preventDefault();
      window.scrollTo(0, 0);
    }

    function preventKeyScroll(e){
      const keys = ["ArrowUp","ArrowDown","PageUp","PageDown","Home","End"," "];
      if(keys.includes(e.key)){
        e.preventDefault();
        window.scrollTo(0, 0);
      }
    }

    function lockScroll(){
      root.classList.add("lock-scroll");
      body.classList.add("lock-scroll");
      window.scrollTo(0, 0);
      window.addEventListener("wheel", preventScroll, wheelOpts);
      window.addEventListener("touchmove", preventScroll, wheelOpts);
      window.addEventListener("keydown", preventKeyScroll, true);
    }

    function unlockScroll(){
      root.classList.remove("lock-scroll");
      body.classList.remove("lock-scroll");
      window.removeEventListener("wheel", preventScroll, wheelOpts);
      window.removeEventListener("touchmove", preventScroll, wheelOpts);
      window.removeEventListener("keydown", preventKeyScroll, true);
      body.style.cursor = "auto";
      ScrollTrigger.refresh();
    }

    /* Menu */
    menuToggle.addEventListener("click", () => {
      menuPanel.classList.toggle("open");
    });

    menuClose.addEventListener("click", () => {
      menuPanel.classList.remove("open");
    });

    document.addEventListener("click", (e) => {
      if (!menuPanel.contains(e.target) && !menuToggle.contains(e.target)) {
        menuPanel.classList.remove("open");
      }
    });

    /* Torch tracking */
    document.addEventListener("mousemove", (e) => {
      root.style.setProperty("--x", e.clientX + "px");
      root.style.setProperty("--y", e.clientY + "px");

      torch.style.left = e.clientX + "px";
      torch.style.top = e.clientY + "px";
    });

    document.addEventListener("touchmove", (e) => {
      const touch = e.touches[0];
      if (!touch) return;

      root.style.setProperty("--x", touch.clientX + "px");
      root.style.setProperty("--y", touch.clientY + "px");

      torch.style.left = touch.clientX + "px";
      torch.style.top = touch.clientY + "px";
    }, { passive: true });

    /* Intro lock */
    lockScroll();

    setTimeout(() => {
      dark.style.opacity = "0";
      torch.style.opacity = "0";

      setTimeout(() => {
        unlockScroll();
      }, 700);
    }, 2200);

    /* Parallax timeline */
    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: "#museum-sequence",
        start: "top top",
        end: "bottom bottom",
        scrub: 1.15
      }
    });

    /* Phase 1: subtle push into exterior */
    tl.to(".sky", {
      scale: 1.05,
      yPercent: -2,
      ease: "none"
    }, 0);

    tl.to(".mid", {
      scale: 1.11,
      yPercent: -5,
      ease: "none"
    }, 0);

    tl.to(".front", {
      scale: 1.18,
      yPercent: -9,
      ease: "none"
    }, 0);

    tl.to(".foreground", {
      scale: 1.28,
      yPercent: -14,
      xPercent: -2,
      ease: "none"
    }, 0);

    /* Phase 2: doorway reveal into hallway */
    tl.to(".hall", {
      opacity: 1,
      scale: 1.06,
      filter: "blur(3px)",
      clip-path: "ellipse(16% 20% at 50% 72%)",
      ease: "none"
    }, 0.38);

    tl.to(".hall", {
      scale: 1.02,
      filter: "blur(0px)",
      clip-path: "ellipse(48% 48% at 50% 58%)",
      ease: "none"
    }, 0.55);

    /* Phase 3: hallway takes over */
    tl.to(".hall", {
      scale: 1,
      clip-path: "ellipse(140% 140% at 50% 50%)",
      ease: "none"
    }, 0.72);

    tl.to([".sky", ".mid", ".front", ".foreground"], {
      opacity: 0,
      ease: "none"
    }, 0.72);

    /* Slight hallway push after reveal */
    tl.to(".hall", {
      scale: 1.05,
      ease: "none"
    }, 0.9);

    /* Safety refresh */
    window.addEventListener("load", () => {
      ScrollTrigger.refresh();
    });

    window.addEventListener("resize", () => {
      ScrollTrigger.refresh();
    });
  </script>
</body>
</html>
