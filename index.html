<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scene 1</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold-1:#f6ead2;
      --gold-2:#ead7ae;
      --gold-3:#d7b675;
      --text:#f7f1e7;
      --bg:#050505;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      background:var(--bg);
    }

    body{
      font-family:"Inter",sans-serif;
      color:var(--text);
    }

    .scene1-wrapper{
      position:relative;
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      isolation:isolate;
    }

    .scene{
      position:absolute;
      inset:0;
    }

    .layer{
      position:absolute;
      pointer-events:none;
      user-select:none;
      will-change:transform, opacity, filter;
    }

    .sky{
      z-index:1;
      top:-6%;
      left:-4%;
      width:108%;
      height:112%;
      object-fit:cover;
    }

    .mid{
      z-index:2;
      top:-8%;
      left:-5%;
      width:112%;
      height:122%;
      object-fit:cover;
    }

    /* dulled front so it blends better */
    .front{
      z-index:3;
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      height:auto;
      object-fit:contain;
      object-position:center bottom;
      transform-origin:center bottom;
      filter:
        brightness(0.88)
        saturate(0.88)
        contrast(0.94)
        blur(0.2px);
      opacity:0.94;
    }

    /* fully visible foreground */
    .foreground{
      position:absolute;
      z-index:4;
      width:72vw;
      max-width:1280px;
      min-width:520px;
      left:0;
      bottom:0;
      height:auto;
      transform-origin:left bottom;
      transform:scale(1.02);
      filter:
        brightness(1.02)
        contrast(0.98)
        saturate(0.94)
        drop-shadow(0 14px 28px rgba(0,0,0,0.32));
    }

    .bg2{
      z-index:5;
      top:-4%;
      left:-3%;
      width:106%;
      height:110%;
      object-fit:cover;
      opacity:0;
      transform:scale(1.04);
    }

    .bg2-content{
      position:absolute;
      z-index:6;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      width:min(92vw, 960px);
      text-align:center;
      opacity:0;
      pointer-events:none;
    }

    /* subtle translucent plate */
    .text-plate{
      position:absolute;
      inset:-28px -34px;
      z-index:1;
      background:rgba(0,0,0,0.16);
      border:1px solid rgba(255,255,255,0.05);
      backdrop-filter:blur(5px);
      -webkit-backdrop-filter:blur(5px);
      border-radius:28px;
      box-shadow:
        0 10px 34px rgba(0,0,0,0.20),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .bg2-content h1{
      position:relative;
      z-index:2;
      font-family:"Cormorant Garamond", serif;
      font-size:clamp(2.5rem, 5.2vw, 4.6rem);
      font-weight:600;
      line-height:1.05;
      letter-spacing:0.01em;
      white-space:nowrap;
      background:linear-gradient(
        120deg,
        #fffdf9 0%,
        #f6eddc 38%,
        #ead7ae 70%,
        #d7b675 100%
      );
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:
        0 2px 8px rgba(0,0,0,0.30),
        0 10px 24px rgba(0,0,0,0.34);
    }

    .gold-line{
      position:relative;
      z-index:2;
      width:120px;
      height:1px;
      margin:1rem auto 0.95rem;
      background:linear-gradient(
        to right,
        transparent,
        rgba(236,221,184,0.95),
        transparent
      );
      opacity:0.95;
    }

    .bg2-content p{
      position:relative;
      z-index:2;
      margin-top:0;
      font-size:1rem;
      line-height:1.6;
      color:rgba(250,246,239,0.92);
      letter-spacing:0.02em;
      text-shadow:0 2px 12px rgba(0,0,0,0.28);
    }

    @media (max-width: 900px){
      .foreground{
        width:82vw;
        min-width:0;
      }
    }

    @media (max-width: 768px){
      .scene1-wrapper{
        height:100svh;
      }

      .foreground{
        width:92vw;
      }

      .bg2-content h1{
        font-size:clamp(2rem, 8vw, 3rem);
        white-space:normal;
      }

      .text-plate{
        inset:-18px -18px;
        border-radius:22px;
      }

      .bg2-content p{
        font-size:0.92rem;
      }
    }
  </style>
</head>
<body>

<section class="scene1-wrapper" id="scene1">

  <div class="scene">
    <img src="bg1-sky.png" class="layer sky" id="sky" alt="sky">
    <img src="bg1-mid.png" class="layer mid" id="mid" alt="mid">
    <img src="bg1-front.png" class="layer front" id="front" alt="front">
    <img src="bg1-foreground.png" class="foreground" id="foreground" alt="foreground">
  </div>

  <div class="scene">
    <img src="bg2-main.png" class="layer bg2" id="bg2" alt="bg2">

    <div class="bg2-content" id="bg2Content">
      <div class="text-plate"></div>
      <h1>Hey there, Welcome!!</h1>
      <div class="gold-line"></div>
      <p>Step into my little world of creations</p>
    </div>
  </div>

</section>

<script>
  gsap.registerPlugin(ScrollTrigger);

  const tl = gsap.timeline({
    scrollTrigger:{
      trigger:"#scene1",
      start:"top top",
      end:"+=3200",
      scrub:1.6,
      pin:true
    }
  });

  tl.to("#sky",{ y:30, scale:1.02 },0)
    .to("#mid",{ y:50, scale:1.03 },0)
    .to("#front",{ y:58, scale:1.02 },0)
    .to("#foreground",{ y:108, scale:1.07, x:0 },0)

    .to("#bg2",{ opacity:1 },0.6)
    .to("#bg2Content",{ opacity:1, y:0 },0.75)

    .to("#foreground",{ opacity:0 },0.7)
    .to("#mid",{ opacity:0 },0.75)
    .to("#front",{ opacity:0 },0.8)
    .to("#sky",{ opacity:0.2 },0.85);
</script>

</body>
</html>
