<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clean Seamless Scroll</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <style>
    :root{
      --x:50%;
      --y:50%;
      --gold:#f5d9a6;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      background:#000;
      overflow-x:hidden;
      font-family:Georgia, serif;
      color:var(--gold);
    }

    body.lock{
      overflow:hidden;
      height:100vh;
    }

    #stage{
      position:relative;
      height:300vh;
      cursor:none;
      background:#000;
    }

    .pin{
      position:sticky;
      top:0;
      height:100vh;
      overflow:hidden;
      background:#000;
    }

    .scene{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      will-change:transform;
      transform-origin:center center;
    }

    #bg1{
      background-image:url("bg1.png");
      z-index:3;
    }

    #bg2{
      background-image:url("bg2.jpeg");
      z-index:2;
      transform:scale(1.02);
    }

    #bg3{
      background-image:url("bg3.jpeg");
      z-index:1;
      transform:scale(1.04);
    }

    #dark{
      position:absolute;
      inset:0;
      background:black;
      pointer-events:none;
      z-index:4;
      mask-image:radial-gradient(
        400px 600px at var(--x) var(--y),
        transparent 0%,
        black 70%
      );
      -webkit-mask-image:radial-gradient(
        400px 600px at var(--x) var(--y),
        transparent 0%,
        black 70%
      );
      transition:opacity 2s ease;
    }

    #torch{
      position:absolute;
      width:70px;
      transform:translate(-50%,-15%) rotate(-20deg);
      pointer-events:none;
      z-index:5;
      transition:opacity .6s ease;
    }
  </style>
</head>
<body>

  <section id="stage">
    <div class="pin">
      <div id="bg3" class="scene"></div>
      <div id="bg2" class="scene"></div>
      <div id="bg1" class="scene"></div>
      <div id="dark"></div>
      <img id="torch" src="torchtm.png" alt="Torch" />
    </div>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const root = document.documentElement;
    const torch = document.getElementById("torch");
    const dark = document.getElementById("dark");

    function lock() {
      document.body.classList.add("lock");
      window.scrollTo(0, 0);
    }

    function unlock() {
      document.body.classList.remove("lock");
      document.body.style.cursor = "auto";
      ScrollTrigger.refresh();
    }

    lock();

    document.addEventListener("mousemove", (e) => {
      root.style.setProperty("--x", e.clientX + "px");
      root.style.setProperty("--y", e.clientY + "px");
      torch.style.left = e.clientX + "px";
      torch.style.top = e.clientY + "px";
    });

    setTimeout(() => {
      dark.style.opacity = 0;
      torch.style.opacity = 0;
      unlock();
    }, 2500);

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: "#stage",
        start: "top top",
        end: "bottom bottom",
        scrub: 1
      }
    });

    /* bg1 zoom */
    tl.to("#bg1", {
      scale: 1.18,
      yPercent: 6,
      ease: "none"
    }, 0);

    /* bg1 pushes more, revealing bg2 beneath */
    tl.to("#bg1", {
      scale: 1.38,
      yPercent: 12,
      ease: "none"
    }, 0.35);

    /* bg2 starts taking over */
    tl.to("#bg2", {
      scale: 1.12,
      yPercent: -2,
      ease: "none"
    }, 0.45);

    /* bg2 continues deeper */
    tl.to("#bg2", {
      scale: 1.28,
      yPercent: -6,
      ease: "none"
    }, 0.68);

    /* bg3 starts becoming the depth layer */
    tl.to("#bg3", {
      scale: 1.12,
      yPercent: -2,
      ease: "none"
    }, 0.68);

    /* bg3 final zoom */
    tl.to("#bg3", {
      scale: 1.22,
      yPercent: -5,
      ease: "none"
    }, 0.9);
  </script>
</body>
</html>
