<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scene 1</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#e6c27a;
  --text:#f6f1e8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#050505;
  overflow-x:hidden;
  font-family:"Inter",sans-serif;
  color:var(--text);
}

/* SCENE */
.scene1-wrapper{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.scene{
  position:absolute;
  inset:0;
}

/* BASE LAYERS */
.layer{
  position:absolute;
  will-change:transform,opacity;
}

/* SKY */
.sky{
  z-index:1;
  width:108%;
  height:112%;
  top:-6%;
  left:-4%;
  object-fit:cover;
}

/* MID */
.mid{
  z-index:2;
  width:112%;
  height:120%;
  top:-8%;
  left:-5%;
  object-fit:cover;
}

/* 🔥 FIXED MUSEUM (FRONT) */
.front{
  z-index:3;

  width:70vw;
  max-width:1100px;

  height:auto;

  left:50%;
  bottom:0;

  transform:translateX(-50%) scale(1);

  object-fit:contain;
}

/* FOREGROUND */
.foreground{
  z-index:4;

  width:55vw;
  max-width:900px;

  bottom:0;
  left:0;

  position:absolute;
}

/* BG2 */
.bg2{
  z-index:5;
  width:106%;
  height:110%;
  top:-4%;
  left:-3%;
  object-fit:cover;

  opacity:0;
}

/* TEXT */
.bg2-content{
  position:absolute;
  z-index:6;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  opacity:0;
}

.bg2-content h1{
  font-family:"Cormorant Garamond",serif;
  font-size:clamp(2.5rem,6vw,5rem);

  background:linear-gradient(
    120deg,
    #fffdf9,
    #f6eddc,
    #ead7ae,
    #d7b675
  );
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.bg2-content p{
  margin-top:1rem;
  font-size:1rem;
  color:rgba(255,255,255,0.85);
}

</style>
</head>

<body>

<section class="scene1-wrapper" id="scene1">

  <div class="scene">
    <img src="bg1-sky.png" class="layer sky" id="sky">
    <img src="bg1-mid.png" class="layer mid" id="mid">

    <!-- FIXED FRONT -->
    <img src="bg1-front.png" class="layer front" id="front">

    <img src="bg1-foreground.png" class="foreground" id="foreground">
  </div>

  <div class="scene">
    <img src="bg2-main.png" class="layer bg2" id="bg2">

    <div class="bg2-content" id="bg2Content">
      <h1>Hey there, Welcome!!</h1>
      <p>Step into my little world of creations</p>
    </div>
  </div>

</section>

<script>
gsap.registerPlugin(ScrollTrigger);

const tl = gsap.timeline({
  scrollTrigger:{
    trigger:"#scene1",
    start:"top top",
    end:"+=3200",
    scrub:1.6,
    pin:true
  }
});

/* PARALLAX */
tl.to("#sky",{y:30,scale:1.02},0)
  .to("#mid",{y:50,scale:1.03},0)
  .to("#front",{y:40,scale:1.05},0)
  .to("#foreground",{y:120,scale:1.08},0)

/* TRANSITION */
  .to("#bg2",{opacity:1},0.6)
  .to("#bg2Content",{opacity:1},0.75)

/* FADE OUT */
  .to("#foreground",{opacity:0},0.7)
  .to("#mid",{opacity:0},0.75)
  .to("#front",{opacity:0},0.8)
  .to("#sky",{opacity:0.2},0.85);

</script>

</body>
</html>
