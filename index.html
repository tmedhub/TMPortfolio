<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinematic Museum Scroll</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <style>
    :root {
      --x: 50vw;
      --y: 50vh;

      /* Torch beam tuning */
      --torch-size-x: 24vw;
      --torch-size-y: 18vw;
      --torch-softness: 55%;
      --overlay-opacity: 0.985;

      /* Door reveal origin — tweak these to align perfectly with your museum doorway */
      --door-x: 50%;
      --door-y: 58%;

      /* starting clip size for hallway */
      --hallway-reveal: 0%;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    body.is-intro {
      cursor: none;
    }

    /* Outer scroll area */
    .scroll-shell {
      position: relative;
      height: 500vh;
      background: #000;
    }

    /* Pinned cinematic scene */
    .scene-pin {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at center, rgba(25,30,42,0.08), rgba(0,0,0,0.55)),
        #000;
    }

    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 30;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0) 45%, rgba(0,0,0,0.35) 78%, rgba(0,0,0,0.6) 100%);
      mix-blend-mode: multiply;
    }

    .layer {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      transform-origin: center center;
      user-select: none;
      pointer-events: none;
      will-change: transform, opacity, clip-path, filter;
      max-width: none;
    }

    /* Oversized layers to avoid gaps */
    .sky {
      z-index: 1;
      width: 128vw;
      height: 128vh;
      object-fit: cover;
    }

    .mid {
      z-index: 3;
      width: 124vw;
      height: 124vh;
      object-fit: cover;
    }

    .museum {
      z-index: 8;
      width: 116vw;
      height: 116vh;
      object-fit: contain;
    }

    .front {
      z-index: 10;
      width: 126vw;
      height: 126vh;
      object-fit: cover;
    }

    .foreground {
      z-index: 12;
      width: 132vw;
      height: 132vh;
      object-fit: cover;
    }

    .hallway {
      z-index: 6;
      width: 124vw;
      height: 124vh;
      object-fit: cover;
      opacity: 1;
      clip-path: circle(var(--hallway-reveal) at var(--door-x) var(--door-y));
      will-change: clip-path, transform, opacity;
    }

    .darkness {
      position: absolute;
      inset: 0;
      z-index: 40;
      pointer-events: none;
      opacity: 1;
      will-change: opacity, background, mask-position;
      background:
        radial-gradient(
          ellipse var(--torch-size-x) var(--torch-size-y) at var(--x) var(--y),
          rgba(0,0,0,0) 0%,
          rgba(0,0,0,0) 22%,
          rgba(0,0,0,0.25) 34%,
          rgba(0,0,0,0.78) var(--torch-softness),
          rgba(0,0,0,var(--overlay-opacity)) 100%
        );
    }

    .torch {
      position: fixed;
      left: 0;
      top: 0;
      width: 88px;
      z-index: 60;
      pointer-events: none;
      transform: translate3d(-50%, -50%, 0);
      will-change: transform, opacity;
      opacity: 1;
      filter: drop-shadow(0 0 18px rgba(255, 180, 90, 0.22));
    }

    .scene-ready .layer {
      opacity: 1;
    }

    /* Optional subtle color treatment */
    .sky,
    .mid,
    .front,
    .foreground {
      filter: saturate(0.95) brightness(0.94);
    }

    .museum {
      filter: saturate(1.02) brightness(0.95);
    }

    .hallway {
      filter: saturate(1.03) brightness(1.02);
    }

    /* Mobile/touch adjustments */
    @media (hover: none), (pointer: coarse) {
      body.is-intro {
        cursor: auto;
      }

      .torch {
        display: none;
      }

      :root {
        --torch-size-x: 42vw;
        --torch-size-y: 34vw;
      }

      .museum {
        width: 130vw;
        height: 118vh;
      }

      .front,
      .foreground,
      .mid,
      .sky,
      .hallway {
        width: 136vw;
        height: 128vh;
      }
    }
  </style>
</head>
<body class="is-intro">
  <main class="scroll-shell">
    <section class="scene-pin">
      <div class="scene" id="scene">
        <!-- Back to front -->
        <img src="bg1-sky.png" class="layer sky" alt="Night sky" />
        <img src="bg1-mid.png" class="layer mid" alt="Distant forest and trees" />

        <!-- hallway exists from the beginning, hidden via clip-path -->
        <img src="hallway.jpeg" class="layer hallway" alt="Interior hallway" />

        <img src="bg2-main.png" class="layer museum" alt="Museum building" />
        <img src="bg1-front.png" class="layer front" alt="Near foreground" />
        <img src="bg1-foreground.png" class="layer foreground" alt="Closest foreground" />

        <!-- Intro darkness overlay -->
        <div class="darkness" id="darkness"></div>
      </div>
    </section>
  </main>

  <!-- Torch cursor -->
  <img src="torchtm.png" class="torch" id="torch" alt="Torch cursor" />

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const root = document.documentElement;
    const body = document.body;

    const scene = document.getElementById("scene");
    const darkness = document.getElementById("darkness");
    const torch = document.getElementById("torch");

    const sky = document.querySelector(".sky");
    const mid = document.querySelector(".mid");
    const museum = document.querySelector(".museum");
    const front = document.querySelector(".front");
    const foreground = document.querySelector(".foreground");
    const hallway = document.querySelector(".hallway");

    const isTouch = window.matchMedia("(hover: none), (pointer: coarse)").matches;

    let introFinished = false;
    let pointerX = window.innerWidth * 0.5;
    let pointerY = window.innerHeight * 0.5;

    let smoothX = pointerX;
    let smoothY = pointerY;

    /* --------------------------
       IMAGE SAFETY / PRELOAD
    --------------------------- */
    const criticalImages = [
      "bg1-sky.png",
      "bg1-mid.png",
      "bg2-main.png",
      "bg1-front.png",
      "bg1-foreground.png",
      "hallway.jpeg",
      "torchtm.png"
    ];

    function preloadImages(paths) {
      return Promise.all(
        paths.map((src) => {
          return new Promise((resolve) => {
            const img = new Image();
            img.onload = resolve;
            img.onerror = resolve;
            img.src = src;
          });
        })
      );
    }

    /* --------------------------
       POINTER / TORCH
    --------------------------- */
    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function setPointer(x, y) {
      pointerX = clamp(x, 0, window.innerWidth);
      pointerY = clamp(y, 0, window.innerHeight);
    }

    function onMouseMove(e) {
      setPointer(e.clientX, e.clientY);
    }

    function onTouchMove(e) {
      if (!e.touches || !e.touches.length) return;
      const t = e.touches[0];
      setPointer(t.clientX, t.clientY);
    }

    function torchLoop() {
      smoothX += (pointerX - smoothX) * 0.16;
      smoothY += (pointerY - smoothY) * 0.16;

      root.style.setProperty("--x", `${smoothX}px`);
      root.style.setProperty("--y", `${smoothY}px`);

      if (!isTouch) {
        torch.style.transform = `translate3d(${smoothX}px, ${smoothY}px, 0) translate(-50%, -50%)`;
      }

      requestAnimationFrame(torchLoop);
    }

    window.addEventListener("mousemove", onMouseMove, { passive: true });
    window.addEventListener("touchstart", onTouchMove, { passive: true });
    window.addEventListener("touchmove", onTouchMove, { passive: true });

    /* --------------------------
       INTRO TIMELINE
    --------------------------- */
    function startIntro() {
      if (isTouch) {
        setPointer(window.innerWidth * 0.5, window.innerHeight * 0.58);
      }

      const introTl = gsap.timeline({
        defaults: { ease: "power2.out" },
        onComplete: () => {
          introFinished = true;
          body.classList.remove("is-intro");
          darkness.style.pointerEvents = "none";
        }
      });

      /* short exploration period */
      introTl.to({}, { duration: 1.9 });

      /* darkness fades out automatically */
      introTl.to(darkness, {
        opacity: 0,
        duration: 1.35,
        ease: "power3.out"
      }, "-=0.08");

      /* torch fades out automatically */
      introTl.to(torch, {
        opacity: 0,
        duration: 0.9,
        ease: "power2.out"
      }, "-=1.0");
    }

    /* --------------------------
       SCROLL CINEMATIC
    --------------------------- */
    function buildScrollExperience() {
      // Set explicit starting transforms to avoid jumps
      gsap.set(sky, {
        xPercent: -50,
        yPercent: -50,
        scale: 1.08,
        x: 0,
        y: 0
      });

      gsap.set(mid, {
        xPercent: -50,
        yPercent: -50,
        scale: 1.1,
        x: 0,
        y: 0
      });

      gsap.set(museum, {
        xPercent: -50,
        yPercent: -50,
        scale: 1.03,
        x: 0,
        y: 10
      });

      gsap.set(front, {
        xPercent: -50,
        yPercent: -50,
        scale: 1.12,
        x: 0,
        y: 0
      });

      gsap.set(foreground, {
        xPercent: -50,
        yPercent: -50,
        scale: 1.18,
        x: 0,
        y: 0
      });

      gsap.set(hallway, {
        xPercent: -50,
        yPercent: -50,
        scale: 1.26,
        x: 0,
        y: 0,
        opacity: 1
      });

      const tl = gsap.timeline({
        defaults: { ease: "none" },
        scrollTrigger: {
          trigger: ".scroll-shell",
          start: "top top",
          end: "+=4200",
          scrub: 1.2,
          pin: ".scene-pin",
          anticipatePin: 1,
          invalidateOnRefresh: true
        }
      });

      /* Phase A: establish forward movement with depth */
      tl.to(sky, {
        y: -50,
        scale: 1.16
      }, 0);

      tl.to(mid, {
        y: -110,
        scale: 1.22
      }, 0);

      tl.to(museum, {
        y: -40,
        scale: 1.15
      }, 0);

      tl.to(front, {
        y: -170,
        x: -26,
        scale: 1.32
      }, 0);

      tl.to(foreground, {
        y: -265,
        x: 36,
        scale: 1.5
      }, 0);

      /* Phase B: strong approach toward museum */
      tl.to(sky, {
        y: -95,
        scale: 1.24
      }, 1.2);

      tl.to(mid, {
        y: -190,
        scale: 1.36
      }, 1.2);

      tl.to(museum, {
        y: -85,
        scale: 1.48
      }, 1.2);

      tl.to(front, {
        y: -340,
        x: -70,
        scale: 1.62,
        opacity: 0.75
      }, 1.2);

      tl.to(foreground, {
        y: -520,
        x: 100,
        scale: 2.0,
        opacity: 0.28
      }, 1.2);

      /* Phase C: foreground exits, doorway becomes focal point */
      tl.to(front, {
        y: -560,
        x: -120,
        scale: 1.95,
        opacity: 0
      }, 2.25);

      tl.to(foreground, {
        y: -820,
        x: 160,
        scale: 2.45,
        opacity: 0
      }, 2.25);

      tl.to(mid, {
        y: -290,
        scale: 1.55,
        opacity: 0.92
      }, 2.25);

      tl.to(museum, {
        y: -145,
        scale: 1.95
      }, 2.25);

      /* Phase D: hallway reveals through doorway itself */
      tl.to(root, {
        "--hallway-reveal": "5%"
      }, 3.05);

      tl.to(hallway, {
        scale: 1.18
      }, 3.05);

      tl.to(root, {
        "--hallway-reveal": "14%"
      }, 3.35);

      tl.to(museum, {
        scale: 2.15,
        y: -162
      }, 3.35);

      tl.to(root, {
        "--hallway-reveal": "28%"
      }, 3.75);

      tl.to(hallway, {
        scale: 1.08
      }, 3.75);

      tl.to(root, {
        "--hallway-reveal": "45%"
      }, 4.15);

      tl.to(museum, {
        scale: 2.38,
        y: -176,
        opacity: 0.98
      }, 4.15);

      tl.to(root, {
        "--hallway-reveal": "68%"
      }, 4.6);

      tl.to(hallway, {
        scale: 1.0
      }, 4.6);

      /* Phase E: hallway takes over, exterior fades only after reveal is substantial */
      tl.to(root, {
        "--hallway-reveal": "110%"
      }, 5.1);

      tl.to([museum, mid, sky], {
        opacity: 0,
        duration: 0.75
      }, 5.12);

      /* Phase F: fully inside hallway */
      tl.to(hallway, {
        scale: 1.04,
        y: -10
      }, 5.35);

      tl.to(hallway, {
        scale: 1.08,
        y: -22
      }, 6.15);
    }

    /* --------------------------
       RESIZE / REFRESH
    --------------------------- */
    function handleResize() {
      ScrollTrigger.refresh();
    }

    window.addEventListener("resize", handleResize);

    /* --------------------------
       INIT
    --------------------------- */
    preloadImages(criticalImages).then(() => {
      scene.classList.add("scene-ready");
      torchLoop();
      startIntro();
      buildScrollExperience();
      ScrollTrigger.refresh();
    });
  </script>
</body>
</html>
