<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beat 1 — Torch to Entrance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    :root{
      --x:50%;
      --y:50%;
      --torchW:420px;
      --torchH:620px;
      --gold:#f5d9a6;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html,body{
      background:#000;
      color:#f5d9a6;
      font-family:Georgia, serif;
      overflow-x:hidden;
      scroll-behavior:smooth;
    }
    body{min-height:100vh}
    button{font:inherit;color:inherit;border:none;background:none;cursor:pointer}

    .top-btn{
      position:fixed;
      top:18px;
      z-index:200;
      display:inline-flex;
      align-items:center;
      gap:.8rem;
      padding:.9rem 1.1rem;
      border-radius:999px;
      border:1px solid rgba(245,217,166,.28);
      background:rgba(0,0,0,.26);
      color:var(--gold);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      letter-spacing:.14em;
      text-transform:uppercase;
      font-size:.72rem;
      transition:transform .22s ease, background .22s ease, border-color .22s ease;
    }
    .top-btn:hover{
      transform:translateY(-2px);
      background:rgba(18,14,11,.54);
      border-color:rgba(245,217,166,.46);
    }
    .menu-toggle{left:18px}
    .work-toggle{right:18px}

    .burger{display:grid;gap:4px}
    .burger span{display:block;width:18px;height:1.5px;border-radius:999px;background:currentColor}

    .menu-panel{
      position:fixed;
      left:18px;
      top:68px;
      width:310px;
      padding:1.1rem 1.35rem 1.35rem;
      background:rgba(0,0,0,.98);
      z-index:220;
      opacity:0;
      pointer-events:none;
      transform:translateY(-8px);
      transition:opacity .22s ease, transform .22s ease;
    }
    .menu-panel.open{opacity:1;pointer-events:auto;transform:translateY(0)}
    .menu-top{display:flex;justify-content:flex-end}
    .menu-close{width:28px;height:28px;display:grid;place-items:center;color:var(--gold)}
    .menu-list{display:grid;gap:1.95rem;padding-top:.35rem}
    .menu-link{width:100%;text-align:left;transition:transform .2s ease, opacity .2s ease}
    .menu-link:hover{transform:translateX(4px);opacity:.86}
    .menu-link strong{display:block;font-size:1.08rem;font-weight:600;letter-spacing:.02em}
    .menu-link span{display:block;margin-top:.36rem;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,217,166,.82)}

    #hero{
      position:relative;
      height:175vh;
      background:#000;
      cursor:none;
    }
    .hero-pin{
      position:sticky;
      top:0;
      height:100vh;
      overflow:hidden;
      background:#000;
    }
    #scene{
      position:absolute;
      inset:0;
      background:url("bg1.png") center bottom/cover no-repeat;
      z-index:1;
      transform-origin:center center;
      will-change:transform, filter;
    }
    #darkness{
      position:absolute;
      inset:0;
      background:black;
      pointer-events:none;
      z-index:10;
      mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      -webkit-mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      transition:opacity 2.2s ease;
    }
    #torch{
      position:absolute;
      width:70px;
      pointer-events:none;
      transform:translate(-50%,-15%) rotate(-20deg);
      z-index:20;
      will-change:left, top, opacity;
    }

    #entrance{
      position:relative;
      height:120vh;
      background:#000;
    }
    .entrance-pin{
      position:sticky;
      top:0;
      height:100vh;
      overflow:hidden;
      background:#000;
    }
    #entranceBg{
      position:absolute;
      inset:0;
      background:url("bg2.png") center center/cover no-repeat;
      will-change:transform;
    }
    .entrance-vignette{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.12) 55%, rgba(0,0,0,.22));
      pointer-events:none;
    }
    .pill{
      position:absolute;
      left:50%;
      bottom:3vh;
      transform:translateX(-50%);
      z-index:40;
      padding:.68rem 1rem;
      border-radius:999px;
      border:1px solid rgba(245,217,166,.12);
      background:rgba(0,0,0,.18);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      color:rgba(245,231,207,.78);
      letter-spacing:.22em;
      text-transform:uppercase;
      font-size:.66rem;
      white-space:nowrap;
    }

    @media (max-width:720px){
      .top-btn{top:14px;font-size:.66rem;padding:.8rem .95rem}
      .menu-toggle{left:14px}
      .work-toggle{right:14px}
      .menu-panel{top:62px;left:14px;width:min(310px, calc(100vw - 28px))}
    }
  </style>
</head>
<body>
  <button class="top-btn menu-toggle" id="menuToggle">
    <span class="burger"><span></span><span></span><span></span></span>
    <span>Museum’s Galleries</span>
  </button>

  <button class="top-btn work-toggle">Let’s Work Together</button>

  <div class="menu-panel" id="menuPanel">
    <div class="menu-top">
      <button class="menu-close" id="menuClose">✕</button>
    </div>
    <div class="menu-list">
      <button class="menu-link"><strong>Canvas Studio</strong><span>Gallery 01</span></button>
      <button class="menu-link"><strong>Project Arcade</strong><span>Gallery 02</span></button>
      <button class="menu-link"><strong>Customization Co-op</strong><span>Gallery 03</span></button>
      <button class="menu-link"><strong>Director's Dome</strong><span>Gallery 04</span></button>
    </div>
  </div>

  <section id="hero">
    <div class="hero-pin">
      <div id="scene"></div>
      <div id="darkness"></div>
      <img id="torch" src="torchtm.png" alt="Torch">
    </div>
  </section>

  <section id="entrance">
    <div class="entrance-pin">
      <div id="entranceBg"></div>
      <div class="entrance-vignette"></div>
      <div class="pill">Entrance</div>
    </div>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const root = document.documentElement;
    const torch = document.getElementById("torch");
    const dark = document.getElementById("darkness");
    const menuToggle = document.getElementById("menuToggle");
    const menuPanel = document.getElementById("menuPanel");
    const menuClose = document.getElementById("menuClose");

    document.addEventListener("mousemove", e => {
      root.style.setProperty("--x", e.clientX + "px");
      root.style.setProperty("--y", e.clientY + "px");
      torch.style.left = e.clientX + "px";
      torch.style.top = e.clientY + "px";
    });

    setTimeout(() => {
      dark.style.opacity = 0;
      torch.style.opacity = 0;
      document.body.style.cursor = "auto";
    }, 8000);

    menuToggle.addEventListener("click", () => menuPanel.classList.toggle("open"));
    menuClose.addEventListener("click", () => menuPanel.classList.remove("open"));
    document.addEventListener("click", e => {
      if (!menuPanel.contains(e.target) && !menuToggle.contains(e.target)) {
        menuPanel.classList.remove("open");
      }
    });

    gsap.to("#scene", {
      scale: 1.24,
      yPercent: 8,
      ease: "none",
      scrollTrigger: {
        trigger: "#hero",
        start: "top top",
        end: "bottom bottom",
        scrub: 1
      }
    });

    gsap.fromTo("#entranceBg",
      { scale: 1.08 },
      {
        scale: 1,
        ease: "none",
        scrollTrigger: {
          trigger: "#entrance",
          start: "top bottom",
          end: "bottom top",
          scrub: 1
        }
      }
    );
  </script>
</body>
</html>
