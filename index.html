<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinematic Museum Scroll</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <style>
    :root {
      --x: 50vw;
      --y: 55vh;

      /* adjust only these if doorway needs retuning later */
      --door-x: 50.5%;
      --door-y: 61%;

      /* hallway reveal */
      --reveal: 0%;

      /* smaller torch */
      --beam-x: 15vw;
      --beam-y: 11vw;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      overflow-x: hidden;
      font-family: Georgia, "Times New Roman", serif;
    }

    body.intro-active {
      cursor: none;
    }

    .scroll-wrap {
      position: relative;
      height: 470vh;
      background: #000;
    }

    .pin-scene {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      background: #000;
    }

    .layer {
      position: absolute;
      transform-origin: center center;
      pointer-events: none;
      user-select: none;
      max-width: none;
      will-change: transform, opacity, clip-path;
    }

    /* composition tuned to match reference image */
    .sky {
      z-index: 1;
      left: 50%;
      top: 49%;
      width: 114vw;
      height: 114vh;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    .mid {
      z-index: 2;
      left: 50%;
      top: 58%;
      width: 110vw;
      height: 108vh;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    /* hallway is fully hidden at start using visibility + opacity */
    .hallway {
      z-index: 3;
      left: 50%;
      top: 50%;
      width: 118vw;
      height: 118vh;
      transform: translate(-50%, -50%);
      object-fit: cover;
      opacity: 0;
      visibility: hidden;
      clip-path: circle(var(--reveal) at var(--door-x) var(--door-y));
    }

    .museum {
      z-index: 4;
      left: 67%;
      top: 57%;
      width: 43vw;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: contain;
    }

    /* smaller sign-ish foreground placed left */
    .foreground {
      z-index: 5;
      left: 16%;
      top: 73%;
      width: 31vw;
      height: auto;
      transform: translate(-50%, -50%);
      object-fit: contain;
    }

    /* front foliage above foreground */
    .front {
      z-index: 6;
      left: 50%;
      top: 68%;
      width: 118vw;
      height: 106vh;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      background:
        radial-gradient(circle at center,
          rgba(0,0,0,0) 48%,
          rgba(0,0,0,0.10) 72%,
          rgba(0,0,0,0.32) 100%);
    }

    .darkness {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      opacity: 1;
      background:
        radial-gradient(
          ellipse var(--beam-x) var(--beam-y) at var(--x) var(--y),
          rgba(0,0,0,0) 0%,
          rgba(0,0,0,0.05) 18%,
          rgba(0,0,0,0.28) 34%,
          rgba(0,0,0,0.74) 54%,
          rgba(0,0,0,0.98) 100%
        );
    }

    .torch {
      position: fixed;
      left: 0;
      top: 0;
      width: 52px;
      z-index: 60;
      pointer-events: none;
      opacity: 1;
      will-change: transform, opacity;
      filter: drop-shadow(0 0 10px rgba(255, 176, 88, 0.15));
    }

    @media (max-width: 1100px) {
      .museum {
        left: 66%;
        top: 58%;
        width: 52vw;
      }

      .foreground {
        left: 18%;
        top: 75%;
        width: 38vw;
      }
    }

    @media (hover: none), (pointer: coarse) {
      body.intro-active {
        cursor: auto;
      }

      .torch {
        display: none;
      }

      :root {
        --beam-x: 24vw;
        --beam-y: 18vw;
      }

      .sky {
        width: 132vw;
        height: 122vh;
      }

      .mid {
        width: 128vw;
        height: 118vh;
      }

      .hallway {
        width: 132vw;
        height: 122vh;
      }

      .museum {
        left: 67%;
        top: 58%;
        width: 68vw;
      }

      .foreground {
        left: 20%;
        top: 78%;
        width: 48vw;
      }

      .front {
        width: 136vw;
        height: 120vh;
      }
    }
  </style>
</head>
<body class="intro-active">
  <main class="scroll-wrap">
    <section class="pin-scene">
      <div class="scene" id="scene">
        <img src="bg1-sky.png" class="layer sky" alt="Night sky" />
        <img src="bg1-mid.png" class="layer mid" alt="Distant forest" />
        <img src="hallway.jpeg" class="layer hallway" alt="Interior hallway" />
        <img src="bg2-main.png" class="layer museum" alt="Museum building" />
        <img src="bg1-foreground.png" class="layer foreground" alt="Left foreground" />
        <img src="bg1-front.png" class="layer front" alt="Front foliage" />

        <div class="vignette"></div>
        <div class="darkness" id="darkness"></div>
      </div>
    </section>
  </main>

  <img src="torchtm.png" class="torch" id="torch" alt="Torch" />

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const root = document.documentElement;
    const body = document.body;
    const torch = document.getElementById("torch");
    const darkness = document.getElementById("darkness");

    const sky = document.querySelector(".sky");
    const mid = document.querySelector(".mid");
    const hallway = document.querySelector(".hallway");
    const museum = document.querySelector(".museum");
    const foreground = document.querySelector(".foreground");
    const front = document.querySelector(".front");

    const isTouch = window.matchMedia("(hover: none), (pointer: coarse)").matches;

    let targetX = window.innerWidth * 0.5;
    let targetY = window.innerHeight * 0.55;
    let currentX = targetX;
    let currentY = targetY;

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function setPointer(x, y) {
      targetX = clamp(x, 0, window.innerWidth);
      targetY = clamp(y, 0, window.innerHeight);
    }

    function onMove(e) {
      setPointer(e.clientX, e.clientY);
    }

    function onTouch(e) {
      if (!e.touches || !e.touches[0]) return;
      setPointer(e.touches[0].clientX, e.touches[0].clientY);
    }

    function renderTorch() {
      currentX += (targetX - currentX) * 0.16;
      currentY += (targetY - currentY) * 0.16;

      root.style.setProperty("--x", `${currentX}px`);
      root.style.setProperty("--y", `${currentY}px`);

      if (!isTouch) {
        torch.style.transform =
          `translate(${currentX}px, ${currentY}px) translate(-50%, -50%) rotate(-14deg)`;
      }

      requestAnimationFrame(renderTorch);
    }

    window.addEventListener("mousemove", onMove, { passive: true });
    window.addEventListener("touchstart", onTouch, { passive: true });
    window.addEventListener("touchmove", onTouch, { passive: true });

    function preload(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = resolve;
        img.onerror = resolve;
        img.src = src;
      });
    }

    async function preloadAll() {
      await Promise.all([
        preload("bg1-sky.png"),
        preload("bg1-mid.png"),
        preload("bg2-main.png"),
        preload("bg1-front.png"),
        preload("bg1-foreground.png"),
        preload("hallway.jpeg"),
        preload("torchtm.png")
      ]);
    }

    function setInitialState() {
      gsap.set(sky, {
        x: 0,
        y: 0,
        scale: 1.02,
        opacity: 1
      });

      gsap.set(mid, {
        x: 0,
        y: 0,
        scale: 1.04,
        opacity: 1
      });

      gsap.set(hallway, {
        x: 0,
        y: 0,
        scale: 1.16,
        opacity: 0,
        visibility: "hidden"
      });

      gsap.set(museum, {
        x: 0,
        y: 0,
        scale: 1.0,
        opacity: 1
      });

      gsap.set(foreground, {
        x: 0,
        y: 0,
        scale: 1.0,
        opacity: 1
      });

      gsap.set(front, {
        x: 0,
        y: 0,
        scale: 1.02,
        opacity: 1
      });

      gsap.set(root, {
        "--reveal": "0%"
      });
    }

    function playIntro() {
      const intro = gsap.timeline({
        defaults: { ease: "power2.out" },
        onComplete: () => {
          body.classList.remove("intro-active");
          darkness.style.pointerEvents = "none";
        }
      });

      intro.to({}, { duration: 1.8 });

      intro.to(darkness, {
        opacity: 0,
        duration: 1.1,
        ease: "power3.out"
      });

      intro.to(torch, {
        opacity: 0,
        duration: 0.75
      }, "-=0.85");
    }

    function buildScrollTimeline() {
      const tl = gsap.timeline({
        scrollTrigger: {
          trigger: ".scroll-wrap",
          start: "top top",
          end: "+=4300",
          scrub: 1,
          pin: ".pin-scene",
          anticipatePin: 1,
          invalidateOnRefresh: true
        }
      });

      /* phase 1: gentle approach matching reference layout */
      tl.to(sky, {
        y: -25,
        scale: 1.05,
        ease: "none"
      }, 0);

      tl.to(mid, {
        y: -55,
        scale: 1.10,
        ease: "none"
      }, 0);

      tl.to(museum, {
        y: -18,
        x: -18,
        scale: 1.14,
        ease: "none"
      }, 0);

      tl.to(foreground, {
        y: -35,
        x: -12,
        scale: 1.02,
        opacity: 0.95,
        ease: "none"
      }, 0);

      tl.to(front, {
        y: -85,
        x: -10,
        scale: 1.08,
        ease: "none"
      }, 0);

      /* phase 2: stronger move toward museum */
      tl.to(sky, {
        y: -55,
        scale: 1.08,
        ease: "none"
      }, 1);

      tl.to(mid, {
        y: -120,
        scale: 1.18,
        ease: "none"
      }, 1);

      tl.to(museum, {
        y: -70,
        x: -38,
        scale: 1.42,
        ease: "none"
      }, 1);

      tl.to(foreground, {
        y: -95,
        x: -24,
        scale: 1.08,
        opacity: 0.72,
        ease: "none"
      }, 1);

      tl.to(front, {
        y: -210,
        x: -30,
        scale: 1.22,
        opacity: 0.82,
        ease: "none"
      }, 1);

      /* phase 3: foreground clears, museum dominates */
      tl.to(foreground, {
        y: -170,
        x: -40,
        scale: 1.15,
        opacity: 0,
        ease: "none"
      }, 2);

      tl.to(front, {
        y: -430,
        x: -64,
        scale: 1.48,
        opacity: 0,
        ease: "none"
      }, 2);

      tl.to(mid, {
        y: -210,
        scale: 1.30,
        opacity: 0.96,
        ease: "none"
      }, 2);

      tl.to(museum, {
        y: -130,
        x: -56,
        scale: 1.88,
        ease: "none"
      }, 2);

      /* phase 4: hallway ONLY becomes renderable here */
      tl.set(hallway, {
        visibility: "visible"
      }, 3.0);

      tl.to(hallway, {
        opacity: 1,
        duration: 0.01
      }, 3.0);

      tl.to(root, {
        "--reveal": "3%",
        ease: "none"
      }, 3.0);

      tl.to(museum, {
        scale: 2.02,
        y: -148,
        x: -62,
        ease: "none"
      }, 3.0);

      tl.to(root, {
        "--reveal": "8%",
        ease: "none"
      }, 3.32);

      tl.to(hallway, {
        scale: 1.11,
        ease: "none"
      }, 3.32);

      tl.to(root, {
        "--reveal": "16%",
        ease: "none"
      }, 3.68);

      tl.to(museum, {
        scale: 2.18,
        y: -162,
        x: -68,
        ease: "none"
      }, 3.68);

      tl.to(root, {
        "--reveal": "30%",
        ease: "none"
      }, 4.05);

      tl.to(hallway, {
        scale: 1.05,
        ease: "none"
      }, 4.05);

      tl.to(root, {
        "--reveal": "52%",
        ease: "none"
      }, 4.45);

      tl.to(museum, {
        scale: 2.34,
        y: -176,
        x: -74,
        ease: "none"
      }, 4.45);

      /* phase 5: hallway takes over */
      tl.to(root, {
        "--reveal": "125%",
        ease: "none"
      }, 5.0);

      tl.to(hallway, {
        scale: 1.0,
        ease: "none"
      }, 5.0);

      tl.to([museum, mid, sky], {
        opacity: 0,
        ease: "none"
      }, 5.04);

      /* phase 6: inside hallway */
      tl.to(hallway, {
        scale: 1.04,
        y: -10,
        ease: "none"
      }, 5.7);

      tl.to(hallway, {
        scale: 1.08,
        y: -22,
        ease: "none"
      }, 6.35);
    }

    window.addEventListener("resize", () => ScrollTrigger.refresh());

    async function init() {
      await preloadAll();
      setInitialState();
      renderTorch();
      playIntro();
      buildScrollTimeline();
      ScrollTrigger.refresh();
    }

    init();
  </script>
</body>
</html>
