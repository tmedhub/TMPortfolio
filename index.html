<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Museumof Me</title>

  <script>
    if ("scrollRestoration" in history) {
      history.scrollRestoration = "manual";
    }

    window.addEventListener("beforeunload", () => {
      window.scrollTo(0, 0);
    });

    window.addEventListener("load", () => {
      window.scrollTo(0, 0);
      setTimeout(() => window.scrollTo(0, 0), 10);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold-1:#f6ead2;
      --gold-2:#ead7ae;
      --gold-3:#d7b675;
      --gold-4:#9b6a32;
      --brown-1:#25170d;
      --brown-2:#130d09;
      --text:#f7f1e7;
      --bg:#050505;

      --x:50%;
      --y:50%;
      --torchW:320px;
      --torchH:480px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      background:var(--bg);
      scroll-behavior:smooth;
    }

    body{
      font-family:"Inter",sans-serif;
      color:var(--text);
      background:#050505;
      cursor:none;
    }

    body.scroll-locked{
      overflow:hidden;
      touch-action:none;
    }

    body.torch-ended{
      cursor:auto;
    }

    .museum-nav{
      position:fixed;
      top:22px;
      left:24px;
      right:24px;
      z-index:60;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      pointer-events:none;
    }

    .museum-btn{
      pointer-events:auto;
      position:relative;
      display:inline-flex;
      align-items:center;
      gap:12px;
      padding:14px 18px;
      border-radius:999px;
      border:1px solid rgba(234,215,174,0.22);
      background:linear-gradient(180deg, rgba(22,18,13,0.82), rgba(10,8,6,0.72));
      color:#f3e7cd;
      text-decoration:none;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,245,220,0.06);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      transition:
        transform 0.3s ease,
        border-color 0.3s ease,
        background 0.3s ease,
        box-shadow 0.3s ease,
        color 0.3s ease;
    }

    .museum-btn:hover{
      transform:translateY(-1px);
      border-color:rgba(234,215,174,0.42);
      box-shadow:
        0 16px 34px rgba(0,0,0,0.34),
        0 0 0 1px rgba(215,182,117,0.06),
        inset 0 1px 0 rgba(255,245,220,0.08);
      color:#fff5dd;
    }

    .museum-btn::before{
      content:"";
      position:absolute;
      inset:1px;
      border-radius:inherit;
      pointer-events:none;
      background:linear-gradient(
        135deg,
        rgba(255,245,220,0.05),
        rgba(255,245,220,0.01) 35%,
        rgba(215,182,117,0.04) 100%
      );
    }

    .btn-label{
      position:relative;
      z-index:1;
      font-family:"Cormorant Garamond", serif;
      font-size:1.15rem;
      letter-spacing:0.04em;
      font-weight:600;
      white-space:nowrap;
    }

    .museum-menu-btn{
      position:relative;
    }

    .menu-icon{
      position:relative;
      z-index:1;
      width:18px;
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .menu-icon span{
      display:block;
      width:18px;
      height:1px;
      border-radius:99px;
      background:linear-gradient(
        to right,
        rgba(246,234,210,0.95),
        rgba(215,182,117,0.95)
      );
      box-shadow:0 0 8px rgba(215,182,117,0.18);
    }

    .gallery-dropdown{
      position:absolute;
      top:68px;
      left:0;
      min-width:320px;
      padding:12px;
      border-radius:24px;
      border:1px solid rgba(234,215,174,0.18);
      background:linear-gradient(180deg, rgba(16,13,10,0.96), rgba(8,7,5,0.94));
      box-shadow:
        0 24px 60px rgba(0,0,0,0.44),
        inset 0 1px 0 rgba(255,245,220,0.05);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      opacity:0;
      visibility:hidden;
      transform:translateY(10px) scale(0.98);
      transform-origin:top left;
      transition:
        opacity 0.28s ease,
        transform 0.28s ease,
        visibility 0.28s ease;
      pointer-events:none;
    }

    .gallery-dropdown.open{
      opacity:1;
      visibility:visible;
      transform:translateY(0) scale(1);
      pointer-events:auto;
    }

    .gallery-link{
      display:flex;
      flex-direction:column;
      gap:3px;
      padding:12px 14px;
      border-radius:16px;
      text-decoration:none;
      transition:
        background 0.25s ease,
        color 0.25s ease,
        transform 0.25s ease;
    }

    .gallery-link:hover{
      background:rgba(215,182,117,0.08);
      transform:translateX(3px);
    }

    .gallery-kicker{
      font-size:0.72rem;
      letter-spacing:0.22em;
      text-transform:uppercase;
      color:rgba(215,182,117,0.9);
      font-weight:500;
    }

    .gallery-name{
      font-family:"Cormorant Garamond", serif;
      font-size:1.15rem;
      color:rgba(247,241,231,0.92);
      letter-spacing:0.03em;
    }

    .museum-work-btn{
      margin-left:auto;
    }

    .scene1-wrapper{
      position:relative;
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      isolation:isolate;
    }

    .scene1-wrapper::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:26vh;
      z-index:12;
      pointer-events:none;
      background:linear-gradient(
        to bottom,
        rgba(0,0,0,0),
        rgba(0,0,0,0.18),
        rgba(0,0,0,0.55),
        #000
      );
    }

    .scene{
      position:absolute;
      inset:0;
    }

    .layer{
      position:absolute;
      pointer-events:none;
      user-select:none;
      will-change:transform, opacity, filter;
    }

    .sky{
      z-index:1;
      top:-6%;
      left:-4%;
      width:108%;
      height:112%;
      object-fit:cover;
    }

    .mid{
      z-index:2;
      top:-8%;
      left:-5%;
      width:112%;
      height:122%;
      object-fit:cover;
    }

    .front{
      z-index:3;
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      height:auto;
      object-fit:contain;
      object-position:center bottom;
      transform-origin:center bottom;
      opacity:1;
    }

    .foreground{
      position:absolute;
      z-index:4;
      width:72vw;
      max-width:1280px;
      min-width:520px;
      left:0;
      bottom:0;
      height:auto;
      transform-origin:left bottom;
      transform:scale(1.02);
      filter:
        brightness(1.02)
        contrast(0.98)
        saturate(0.94)
        drop-shadow(0 14px 28px rgba(0,0,0,0.32));
    }

    .bg2{
      z-index:5;
      top:-4%;
      left:-3%;
      width:106%;
      height:110%;
      object-fit:cover;
      opacity:0;
      transform:scale(1.02);
    }

    .bg2-content{
      position:absolute;
      z-index:6;
      left:50%;
      top:44%;
      transform:translate(-50%, -50%);
      width:min(92vw, 960px);
      text-align:center;
      opacity:0;
      pointer-events:none;
      will-change:transform, opacity;
      padding:34px 42px 30px;
    }

    .text-plate{
      position:absolute;
      inset:0;
      z-index:1;
      background:rgba(255,255,255,0.032);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:30px;
      opacity:1;
    }

    .bg2-content h1{
      position:relative;
      z-index:2;
      font-family:"Cormorant Garamond", serif;
      font-size:clamp(2.5rem, 5.2vw, 4.6rem);
      font-weight:600;
      line-height:1.05;
      letter-spacing:0.01em;
      white-space:nowrap;
      background:linear-gradient(
        120deg,
        #fffdf9 0%,
        #f6eddc 38%,
        #ead7ae 70%,
        #d7b675 100%
      );
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:
        0 2px 10px rgba(0,0,0,0.32),
        0 10px 28px rgba(0,0,0,0.24);
    }

    .gold-line{
      position:relative;
      z-index:2;
      width:120px;
      height:1px;
      margin:1rem auto 0.95rem;
      background:linear-gradient(
        to right,
        transparent,
        rgba(236,221,184,0.95),
        transparent
      );
      opacity:0.95;
    }

    .bg2-content p{
      position:relative;
      z-index:2;
      margin-top:0;
      font-size:1rem;
      line-height:1.6;
      color:rgba(250,246,239,0.92);
      letter-spacing:0.02em;
      text-shadow:0 2px 10px rgba(0,0,0,0.22);
    }

    #darkness{
      position:absolute;
      inset:0;
      background:black;
      pointer-events:none;
      z-index:50;
      mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      -webkit-mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      transition:opacity 2.2s ease;
    }

    #torch{
      position:absolute;
      width:70px;
      pointer-events:none;
      transform:translate(-50%,-15%) rotate(-20deg);
      z-index:60;
      transition:opacity 2.2s ease;
    }

    .canvas-wrap,
    0,0,0,0.35);
    }

    .panel-line{      document.body.classList.add("torch-ended");
        unlockPageScroll();
        darkness.style.display = "none";
        torch.style.display = "none";
      }, 2200);
    }, 5000);

    const galleryToggle = document.getElementById("galleryToggle");
    const galleryDropdown = document.getElementById("galleryDropdown");

    galleryToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      galleryDropdown.classList.toggle("open");
    });

    document.addEventListener("click", (e) => {
      if (!galleryDropdown.contains(e.target) && !galleryToggle.contains(e.target)) {
        galleryDropdown.classList.remove("open");
      }
    });

    document.querySelectorAll(".gallery-link").forEach(link => {
      link.addEventListener("click", () => {
        galleryDropdown.classList.remove("open");
      });
    });

    const tl = gsap.timeline({
      scrollTrigger:{
        trigger:"#scene1",
        start:"top top",
        end:"+=2000",
        scrub:1.15,
        pin:true
      }
    });

    tl.to("#sky",{ y:22, scale:1.015 },0)
      .to("#mid",{ y:36, scale:1.02 },0)
      .to("#front",{ y:42, scale:1.015 },0)
      .to("#foreground",{ y:78, scale:1.045, x:0 },0)
      .to("#bg2",{ opacity:1, scale:1, duration:0.82, ease:"power2.out" },0.40)
      .to("#bg2Content",{ opacity:1, y:-1, duration:0.58, ease:"power1.out" },0.46)
      .to("#foreground",{ opacity:0 },0.50)
      .to("#mid",{ opacity:0 },0.56)
      .to("#front",{ opacity:0 },0.60)
      .to("#sky",{ opacity:0.08 },0.66);

    gsap.timeline({
      scrollTrigger:{
        trigger:"#canvasStudio",
        start:"top bottom",
        end:"top 55%",
        scrub:1
      }
    })
    .fromTo("#freeform",
      { opacity:0.90, scale:1.012 },
      { opacity:1, scale:1, ease:"none" },
      0
    )
    .fromTo("#freeformTitle",
      { opacity:0.65, y:18 },
      { opacity:1, y:0, ease:"none" },
      0.08
    );

    const freeform = document.getElementById("freeform");
    const inner = document.getElementById("freeformInner");

    let canvasBuilt = false;
    let frames = [];
    let posX = 0, posY = 0, velX = 0, velY = 0;
    let dragging = false;

    const VIEW_LIMIT_X = 980;
    const VIEW_LIMIT_Y = 760;
    const RESPAWN_LIMIT_X = 1120;
    const RESPAWN_LIMIT_Y = 860;

    function getSpawnPosition(range, edgePad = 180){
      const side = Math.floor(Math.random() * 4);
      let x = 0, y = 0;

      if (side === 0) {
        x = -VIEW_LIMIT_X - edgePad - Math.random() * 180;
        y = (Math.random() * range) - range / 2;
      } else if (side === 1) {
        x = VIEW_LIMIT_X + edgePad + Math.random() * 180;
        y = (Math.random() * range) - range / 2;
      } else if (side === 2) {
        x = (Math.random() * range) - range / 2;
        y = -VIEW_LIMIT_Y - edgePad - Math.random() * 160;
      } else {
        x = (Math.random() * range) - range / 2;
        y = VIEW_LIMIT_Y + edgePad + Math.random() * 160;
      }

      return { x, y };
    }

    function place(frame, range, minDist, preferEdge = false){
      let candidate, ok = false, tries = 0;

      while(!ok && tries < 140){
        candidate = preferEdge
          ? getSpawnPosition(range)
          : {
              x: Math.random() * range - range / 2,
              y: Math.random() * range - range / 2
            };

        ok = frames.every(f => {
          if (f === frame) return true;
          return Math.hypot(f.x - candidate.x, f.y - candidate.y) > minDist;
        });

        tries++;
      }

      frame.x = candidate.x;
      frame.y = candidate.y;
    }

    function buildFreeform(){
      if (canvasBuilt) return;
      canvasBuilt = true;

      inner.innerHTML = "";
      frames = [];

      const COUNT = 8;
      const RANGE = 2600;
      const MIN_DIST = 340;
      const imgs = [...Array(8)].map((_,i)=>`art${i+1}.png`);

      for(let i=0;i<COUNT;i++){
        const img = document.createElement("img");
        img.src = imgs[i];
        img.alt = `Artwork ${i+1}`;
        inner.appendChild(img);

        const frame = { img, x:0, y:0, id:i, opacity:0 };
        place(frame, RANGE, MIN_DIST, i > 2);
        frames.push(frame);
      }

      freeform.onmousedown = () => {
        dragging = true;
        freeform.classList.add("is-dragging");
      };

      window.addEventListener("mouseup", () => {
        dragging = false;
        freeform.classList.remove("is-dragging");
      });

      window.addEventListener("mousemove", e => {
        if (dragging) {
          velX += e.movementX * 0.12;
          velY += e.movementY * 0.12;
        }
      });

      (function loop(){
        if (!dragging) velX += 0.028;

        posX += velX;
        posY += velY;
        velX *= 0.92;
        velY *= 0.92;

        frames.forEach(f => {
          const screenX = f.x + posX;
          const screenY = f.y + posY;

          if (!f.opacity) f.opacity = 0;

          const visible =
            screenX > -260 && screenX < window.innerWidth + 80 &&
            screenY > -260 && screenY < window.innerHeight + 80;

          const target = visible ? 1 : 0;
          f.opacity += (target - f.opacity) * 0.08;

          const outOfRange =
            screenX > RESPAWN_LIMIT_X || screenX < -RESPAWN_LIMIT_X ||
            screenY > RESPAWN_LIMIT_Y || screenY < -RESPAWN_LIMIT_Y;

          if (outOfRange) {
            place(f, 2600, 340, true);
            f.opacity = 0;
          }

          f.img.style.left = (f.x + posX) + "px";
          f.img.style.top = (f.y + posY) + "px";
          f.img.style.opacity = f.opacity;
        });

        requestAnimationFrame(loop);
      })();
    }

    ScrollTrigger.create({
      trigger: "#canvasStudio",
      start: "top top",
      onEnter: () => {
        buildFreeform();
      }
    });

    const shell = document.getElementById("scrollShell");
    const track = document.getElementById("track");
    const projectsJourney = document.getElementById("projectsJourney");
    const bg4Base = document.getElementById("bg4Base");
    const bg4Overlay = document.getElementById("bg4Overlay");
    const bg5Top = document.getElementById("bg5Top");
    const bg5Overlay = document.getElementById("bg5Overlay");
    let currentX = 0;
    let targetX = 0;

    let isDraggingTrack = false;
    let dragStartX = 0;
    let dragStartTargetX = 0;

    function getMinTrackX() {
      return Math.min(0, shell.clientWidth - track.scrollWidth - 40);
    }

    function clampTrackX(x) {
      return Math.max(getMinTrackX(), Math.min(24, x));
    }

    function animateTrack() {
      currentX += (targetX - currentX) * 0.09;
      track.style.transform = `translate3d(${currentX}px,0,0)`;
      requestAnimationFrame(animateTrack);
    }
    animateTrack();

    function projectArcadeVisibleEnough() {
      return gsap.getProperty(projectsJourney, "opacity") > 0.6;
    }

    function beginTrackDrag(clientX) {
      if (!projectArcadeVisibleEnough()) return;
      isDraggingTrack = true;
      dragStartX = clientX;
      dragStartTargetX = targetX;
      shell.classList.add("dragging");
    }

    function moveTrackDrag(clientX) {
      if (!isDraggingTrack) return;
      const dx = clientX - dragStartX;
      targetX = clampTrackX(dragStartTargetX + dx);
    }

    function endTrackDrag() {
      isDraggingTrack = false;
      shell.classList.remove("dragging");
    }

    shell.addEventListener("mousedown", (e) => {
      beginTrackDrag(e.clientX);
    });

    window.addEventListener("mousemove", (e) => {
      moveTrackDrag(e.clientX);
    });

    window.addEventListener("mouseup", () => {
      endTrackDrag();
    });

    shell.addEventListener("touchstart", (e) => {
      beginTrackDrag(e.touches[0].clientX);
    }, { passive: true });

    window.addEventListener("touchmove", (e) => {
      moveTrackDrag(e.touches[0].clientX);
    }, { passive: true });

    window.addEventListener("touchend", () => {
      endTrackDrag();
    });

    const projectArcadeTimeline = gsap.timeline({
      scrollTrigger: {
        trigger: "#projectArcade",
        start: "top top",
        end: () => "+=" + (track.scrollWidth - shell.clientWidth + 3400),
        scrub: 1,
        pin: true,
        invalidateOnRefresh: true,
        onUpdate: self => {
          const progress = self.progress;

          const horizontalStart = 0.34;
          const horizontalEnd = 0.80;

          const moveProgress = gsap.utils.clamp(
            0,
            1,
            (progress - horizontalStart) / (horizontalEnd - horizontalStart)
          );

          const maxX = Math.max(0, track.scrollWidth - shell.clientWidth);
          const scrollDrivenX = clampTrackX(-maxX * moveProgress);

          if (!isDraggingTrack) {
            targetX = scrollDrivenX;
          }
        }
      }
    });

    projectArcadeTimeline
      .fromTo(bg4Base,
        { scale: 1, opacity: 1, xPercent: 0, yPercent: 0 },
        {
          scale: 1.24,
          xPercent: -4,
          yPercent: -2,
          opacity: 1,
          transformOrigin: "50% 50%",
          ease: "none"
        },
        0.00
      )
      .fromTo(bg4Overlay,
        { opacity: 1 },
        { opacity: 0.14, ease: "none" },
        0.00
      )
      .fromTo(bg5Top,
        {
          opacity: 0,
          scale: 1.08,
          xPercent: 0,
          yPercent: 0,
          transformOrigin: "50% 50%"
        },
        {
          opacity: 1,
          scale: 1.02,
          xPercent: 0,
          yPercent: 0,
          ease: "power2.out"
        },
        0.12
      )
      .fromTo(bg5Overlay,
        { opacity: 0 },
        { opacity: 1, ease: "power2.out" },
        0.12
      )
      
      .to(bg4Base, {
        opacity: 0,
        ease: "power2.out"
      }, 0.22)
      .to(bg4Overlay, {
        opacity: 0,
        ease: "power2.out"
      }, 0.22)
      .to(bg5Top, {
        scale: 3.55,
        xPercent: 21,
        yPercent: -11,
        transformOrigin: "20% 28%",
        ease: "power2.inOut"
      }, 0.30)
      .to(bg5Overlay, {
        opacity: 0.16,
        ease: "power2.inOut"
      }, 0.30)
      .fromTo(projectsJourney,
        { opacity: 0 },
        { opacity: 1, ease: "power2.inOut" },
        0.50
      )
      .to(bg5Top, {
        opacity: 0,
        ease: "power2.out"
      }, 0.58)
      .to(bg5Overlay, {
        opacity: 0,
        ease: "power2.out"
      }, 0.58)
      .to(projectsJourney, {
        opacity: 1,
        ease: "none"
      }, 0.80)
      .to(projectsJourney, {
        opacity: 0,
        ease: "power2.inOut"
      }, 0.90);

    window.addEventListener("resize", () => {
      targetX = clampTrackX(targetX);
      ScrollTrigger.refresh();
    });

    const galleryProjectArcade = document.getElementById("galleryProjectArcade");

    function getProjectArcadeScrollDistance() {
      return Math.max(0, track.scrollWidth - shell.clientWidth + 3400);
    }

    function scrollToArcadeExhibits(e) {
      if (e) e.preventDefault();
      const baseTop = projectArcade.offsetTop;
      const targetY = baseTop + getProjectArcadeScrollDistance() * 0.42;
      window.scrollTo({ top: targetY, behavior: "smooth" });
      galleryDropdown.classList.remove("open");
    }

    if (galleryProjectArcade) {
      galleryProjectArcade.addEventListener("click", scrollToArcadeExhibits);
    }

    

    document.querySelectorAll("[data-carousel]").forEach(carousel => {
      const slides = Array.from(carousel.querySelectorAll(".media-slide"));
      const plet index = 0;

 ength;
        renderSlides();
      });

      renderSlides();
    });

    ScrollTrigger.refresh();
  </script>
