<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E1legant Museum Portfolio - Scene 1</title>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050505;
      --gold: #d8b36a;
      --gold-soft: #c59a4d;
      --gold-bright: #f2dca8;
      --text: #f8f3ea;
      --muted: rgba(248, 243, 234, 0.78);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", sans-serif;
      color: var(--text);
      background: #050505;
    }

    .scene1-wrapper {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #000;
      isolation: isolate;
    }

    .scene {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      will-change: transform, opacity, filter;
      pointer-events: none;
      user-select: none;
      max-width: none;
    }

    /* Keep all layers full-screen for better composition */
    .sky {
      z-index: 1;
      width: 108%;
      height: 112%;
      top: -6%;
      left: -4%;
      filter: brightness(1.08) saturate(1.02) contrast(1.04);
    }

    .mid {
      z-index: 2;
      width: 106%;
      height: 108%;
      top: -4%;
      left: -3%;
      filter: brightness(1.03) saturate(0.98) contrast(1.02);
      opacity: 0.95;
    }

    .front {
      z-index: 3;
      width: 104%;
      height: 106%;
      top: -3%;
      left: -2%;
      filter: brightness(1.02) saturate(1) contrast(1.02);
    }

    .foreground {
      z-index: 4;
      width: 104%;
      height: 106%;
      top: -2%;
      left: 0;
      filter: brightness(0.98) saturate(0.96) contrast(1.01);
    }

    .bg2 {
      z-index: 5;
      width: 106%;
      height: 110%;
      top: -4%;
      left: -3%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.04);
      filter: brightness(1.02) saturate(1.02) contrast(1.03);
    }

    .overlay-vignette {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      background:
        radial-gradient(
          circle at center,
          rgba(0,0,0,0.01) 0%,
          rgba(0,0,0,0.05) 48%,
          rgba(0,0,0,0.18) 100%
        );
      mix-blend-mode: multiply;
    }

    .overlay-gold {
      position: absolute;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      background:
        linear-gradient(
          to bottom,
          rgba(216,179,106,0.08) 0%,
          rgba(216,179,106,0.04) 30%,
          rgba(0,0,0,0.03) 68%,
          rgba(0,0,0,0.12) 100%
        );
    }

    .bg2-content {
      position: absolute;
      z-index: 8;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(90vw, 900px);
      text-align: center;
      opacity: 0;
      pointer-events: none;
    }

    .bg2-content h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1;
      font-weight: 600;
      color: var(--gold-bright);
      letter-spacing: 0.02em;
      white-space: nowrap;
      text-shadow:
        0 4px 18px rgba(0,0,0,0.28),
        0 0 20px rgba(216,179,106,0.08);
    }

    .gold-line {
      width: 90px;
      height: 1px;
      margin: 0.9rem auto 0;
      background: linear-gradient(
        to right,
        transparent,
        rgba(216,179,106,0.9),
        transparent
      );
      opacity: 0.9;
    }

    .after-section {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(216,179,106,0.06), transparent 28%),
        linear-gradient(to bottom, #070707, #0a0a0a);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
      border-top: 1px solid rgba(216,179,106,0.08);
    }

    .after-section .content {
      max-width: 900px;
    }

    .after-section h2 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.4rem, 5vw, 4.6rem);
      line-height: 1;
      font-weight: 600;
      color: var(--gold-bright);
      margin-bottom: 1rem;
    }

    .after-section p {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--muted);
      max-width: 680px;
      margin: 0 auto;
      font-weight: 300;
    }

    @media (max-width: 768px) {
      .scene1-wrapper {
        height: 100svh;
      }

      .bg2-content h1 {
        font-size: clamp(1.5rem, 6vw, 2.2rem);
        white-space: normal;
      }
    }
  </style>
</head>
<body>

  <section class="scene1-wrapper" id="scene1">
    <div class="scene scene1-exterior">
      <img src="bg1-sky.png" alt="Sky background" class="layer sky" id="sky" />
      <img src="bg1-mid.png" alt="Mid depth layer" class="layer mid" id="mid" />
      <img src="bg1-front.png" alt="Museum front" class="layer front" id="front" />
      <img src="bg1-foreground.png" alt="Foreground layer" class="layer foreground" id="foreground" />

      <div class="overlay-vignette"></div>
      <div class="overlay-gold"></div>
    </div>

    <div class="scene scene2-preview">
      <img src="bg2-main.png" alt="Museum interior" class="layer bg2" id="bg2" />

      <div class="bg2-content" id="bg2Content">
        <h1>Hey there, Welcome!!</h1>
        <div class="gold-line"></div>
      </div>
    </div>
  </section>

  <section class="after-section">
    <div class="content">
      <h2>The gallery opens here</h2>
      <p>
        Replace this section with your next scene.
      </p>
    </div>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const sky = document.getElementById("sky");
    const mid = document.getElementById("mid");
    const front = document.getElementById("front");
    const foreground = document.getElementById("foreground");
    const bg2 = document.getElementById("bg2");
    const bg2Content = document.getElementById("bg2Content");
    const scene1 = document.getElementById("scene1");

    gsap.set(sky, { y: 0, scale: 1, opacity: 1 });
    gsap.set(mid, { y: 0, scale: 1, opacity: 0.95 });
    gsap.set(front, { y: 0, scale: 1, opacity: 1 });
    gsap.set(foreground, { y: 0, scale: 1, opacity: 1 });
    gsap.set(bg2, { y: 18, scale: 1.04, opacity: 0 });
    gsap.set(bg2Content, { y: 20, opacity: 0 });

    const tl = gsap.timeline({
      defaults: { ease: "none" },
      scrollTrigger: {
        trigger: scene1,
        start: "top top",
        end: "+=3400",
        scrub: 1.8,
        pin: true,
        anticipatePin: 1
      }
    });

    tl.to(sky, {
      y: 24,
      scale: 1.02
    }, 0)

    .to(mid, {
      y: 42,
      scale: 1.03
    }, 0)

    .to(front, {
      y: 68,
      scale: 1.045
    }, 0)

    .to(foreground, {
      y: 110,
      scale: 1.06
    }, 0)

    .to(mid, {
      y: 72,
      scale: 1.045,
      opacity: 0.88
    }, 0.32)

    .to(front, {
      y: 112,
      scale: 1.075,
      opacity: 0.9
    }, 0.38)

    .to(foreground, {
      y: 190,
      scale: 1.09,
      opacity: 0.72
    }, 0.44)

    .to(bg2, {
      opacity: 1,
      scale: 1,
      y: 0
    }, 0.58)

    .to(bg2Content, {
      opacity: 1,
      y: 0
    }, 0.73)

    .to(front, {
      opacity: 0
    }, 0.78)

    .to(mid, {
      opacity: 0
    }, 0.75)

    .to(foreground, {
      opacity: 0
    }, 0.72)

    .to(sky, {
      opacity: 0.2
    }, 0.84);
  </script>

</body>
</html>
