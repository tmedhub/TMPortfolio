<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Museum of Me</title>

  <script>
    if ("scrollRestoration" in history) history.scrollRestoration = "manual";
    window.addEventListener("beforeunload", () => window.scrollTo(0, 0));
    window.addEventListener("load", () => {
      window.scrollTo(0, 0);
      setTimeout(() => window.scrollTo(0, 0), 10);
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --gold-1:#f6ead2;
      --gold-2:#ead7ae;
      --gold-3:#d7b675;
      --gold-4:#9b6a32;
      --text:#f7f1e7;
      --bg:#050505;
      --x:50%;
      --y:50%;
      --torchW:320px;
      --torchH:480px;

      --blue-1:#0f2746;
      --blue-2:#173963;
      --blue-3:#214d84;
      --blue-4:#d9e8ff;

      --connect-gold:#efd38f;
      --connect-gold-2:#d7b675;
      --connect-gold-3:#fff1c8;
    }

    *{ margin:0; padding:0; box-sizing:border-box; }

    html,body{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      background:var(--bg);
      scroll-behavior:smooth;
    }

    body{
      font-family:"Inter",sans-serif;
      color:var(--text);
      background:#050505;
      cursor:none;
    }

    body.scroll-locked{ overflow:hidden; touch-action:none; }
    body.torch-ended{ cursor:auto; }

    .museum-nav{
      position:fixed;
      top:22px;
      left:24px;
      right:24px;
      z-index:140;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      pointer-events:none;
    }

    .museum-btn{
      pointer-events:auto;
      position:relative;
      display:inline-flex;
      align-items:center;
      gap:12px;
      padding:14px 18px;
      border-radius:999px;
      border:1px solid rgba(234,215,174,0.22);
      background:linear-gradient(180deg, rgba(22,18,13,0.82), rgba(10,8,6,0.72));
      color:#f3e7cd;
      text-decoration:none;
      box-shadow:0 10px 30px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,245,220,0.06);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      transition:transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, color 0.3s ease;
    }

    .museum-btn:hover{
      transform:translateY(-1px);
      border-color:rgba(234,215,174,0.42);
      box-shadow:0 16px 34px rgba(0,0,0,0.34), 0 0 0 1px rgba(215,182,117,0.06), inset 0 1px 0 rgba(255,245,220,0.08);
      color:#fff5dd;
    }

    .museum-btn::before{
      content:"";
      position:absolute;
      inset:1px;
      border-radius:inherit;
      pointer-events:none;
      background:linear-gradient(135deg, rgba(255,245,220,0.05), rgba(255,245,220,0.01) 35%, rgba(215,182,117,0.04) 100%);
    }

    .btn-label{
      position:relative;
      z-index:1;
      font-family:"Cormorant Garamond", serif;
      font-size:1.15rem;
      letter-spacing:0.04em;
      font-weight:600;
      white-space:nowrap;
    }

    .museum-menu-btn{ position:relative; }
    .menu-icon{ position:relative; z-index:1; width:18px; display:flex; flex-direction:column; gap:4px; }
    .menu-icon span{
      display:block;
      width:18px;
      height:1px;
      border-radius:99px;
      background:linear-gradient(to right, rgba(246,234,210,0.95), rgba(215,182,117,0.95));
      box-shadow:0 0 8px rgba(215,182,117,0.18);
    }

    .gallery-dropdown{
      position:absolute;
      top:68px;
      left:0;
      min-width:320px;
      padding:12px;
      border-radius:24px;
      border:1px solid rgba(234,215,174,0.18);
      background:linear-gradient(180deg, rgba(16,13,10,0.96), rgba(8,7,5,0.94));
      box-shadow:0 24px 60px rgba(0,0,0,0.44), inset 0 1px 0 rgba(255,245,220,0.05);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      opacity:0;
      visibility:hidden;
      transform:translateY(10px) scale(0.98);
      transform-origin:top left;
      transition:opacity 0.28s ease, transform 0.28s ease, visibility 0.28s ease;
      pointer-events:none;
    }

    .gallery-dropdown.open{
      opacity:1;
      visibility:visible;
      transform:translateY(0) scale(1);
      pointer-events:auto;
    }

    .gallery-link{
      display:flex;
      flex-direction:column;
      gap:3px;
      padding:12px 14px;
      border-radius:16px;
      text-decoration:none;
      transition:background 0.25s ease, transform 0.25s ease;
    }

    .gallery-link:hover{ background:rgba(215,182,117,0.08); transform:translateX(3px); }

    .gallery-kicker{
      font-size:0.72rem;
      letter-spacing:0.22em;
      text-transform:uppercase;
      color:rgba(215,182,117,0.9);
      font-weight:500;
    }

    .gallery-name{
      font-family:"Cormorant Garamond", serif;
      font-size:1.15rem;
      color:rgba(247,241,231,0.92);
      letter-spacing:0.03em;
    }

    .museum-work-btn{ margin-left:auto; }

    .scene1-wrapper{
      position:relative;
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      isolation:isolate;
    }

    .scene1-wrapper::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:26vh;
      z-index:12;
      pointer-events:none;
      background:linear-gradient(to bottom, rgba(0,0,0,0), rgba(0,0,0,0.18), rgba(0,0,0,0.55), #000);
    }

    .scene{ position:absolute; inset:0; }
    .layer{ position:absolute; pointer-events:none; user-select:none; will-change:transform, opacity, filter; }
    .sky{ z-index:1; top:-6%; left:-4%; width:108%; height:112%; object-fit:cover; }
    .mid{ z-index:2; top:-8%; left:-5%; width:112%; height:122%; object-fit:cover; }
    .front{
      z-index:3;
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      height:auto;
      object-fit:contain;
      object-position:center bottom;
      transform-origin:center bottom;
      opacity:1;
    }

    .foreground{
      position:absolute;
      z-index:4;
      width:72vw;
      max-width:1280px;
      min-width:520px;
      left:0;
      bottom:0;
      height:auto;
      transform-origin:left bottom;
      transform:scale(1.02);
      filter:brightness(1.02) contrast(0.98) saturate(0.94) drop-shadow(0 14px 28px rgba(0,0,0,0.32));
    }

    .bg2{
      z-index:5;
      top:-4%;
      left:-3%;
      width:106%;
      height:110%;
      object-fit:cover;
      opacity:0;
      transform:scale(1.02);
    }

    .bg2-content{
      position:absolute;
      z-index:6;
      left:50%;
      top:44%;
      transform:translate(-50%, -50%);
      width:min(92vw, 960px);
      text-align:center;
      opacity:0;
      pointer-events:none;
      will-change:transform, opacity;
      padding:34px 42px 30px;
    }

    .text-plate{
      position:absolute;
      inset:0;
      z-index:1;
      background:rgba(255,255,255,0.032);
      border:1px solid rgba(255,255,255,0.05);
      border-radius:30px;
      opacity:1;
    }

    .bg2-content h1{
      position:relative;
      z-index:2;
      font-family:"Cormorant Garamond", serif;
      font-size:clamp(2.5rem, 5.2vw, 4.6rem);
      font-weight:600;
      line-height:1.05;
      letter-spacing:0.01em;
      white-space:nowrap;
      background:linear-gradient(120deg, #fffdf9 0%, #f6eddc 38%, #ead7ae 70%, #d7b675 100%);
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:0 2px 10px rgba(0,0,0,0.32), 0 10px 28px rgba(0,0,0,0.24);
    }

    .gold-line{
      width:120px;
      height:1px;
      margin:1rem auto 0.95rem;
      background:linear-gradient(to right, transparent, rgba(236,221,184,0.95), transparent);
      opacity:0.95;
    }

    .bg2-content p{
      position:relative;
      z-index:2;
      margin-top:0;
      font-size:1rem;
      line-height:1.6;
      color:rgba(250,246,239,0.92);
      letter-spacing:0.02em;
      text-shadow:0 2px 10px rgba(0,0,0,0.22);
    }

    #darkness{
      position:absolute;
      inset:0;
      background:black;
      pointer-events:none;
      z-index:50;
      mask-image:radial-gradient(var(--torchW) var(--torchH) at var(--x) var(--y), transparent 0%, rgba(0,0,0,.25) 35%, black 65%);
      -webkit-mask-image:radial-gradient(var(--torchW) var(--torchH) at var(--x) var(--y), transparent 0%, rgba(0,0,0,.25) 35%, black 65%);
      transition:opacity 2.2s ease;
    }

    #torch{
      position:absolute;
      width:70px;
      pointer-events:none;
      transform:translate(-50%,-15%) rotate(-20deg);
      z-index:60;
      transition:opacity 2.2s ease;
    }

    .canvas-wrap, .customization-stage, .directors-dome-stage, .lets-connect-stage{
      position:relative;
      min-height:100vh;
      overflow:hidden;
    }

    .canvas-wrap{
      height:100vh;
      background:linear-gradient(to bottom, rgba(0,0,0,0.0), rgba(0,0,0,0.22) 18%, #000 46%), #000;
    }

    .canvas-wrap::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:2;
      background:linear-gradient(to bottom, rgba(245,217,166,0.03) 0%, rgba(0,0,0,0.00) 20%, rgba(0,0,0,0.00) 100%);
    }

    #freeform{
      position:absolute;
      inset:0;
      background:black;
      overflow:hidden;
      cursor:default;
      z-index:100;
      opacity:0.92;
      transform:scale(1.01);
      will-change:opacity, transform;
    }

    body.torch-ended #freeform{ cursor:grab; }
    body.torch-ended #freeform:active,
    body.torch-ended #freeform.is-dragging{ cursor:grabbing; }

    .freeform-inner{ position:absolute; left:0; top:0; }

    .freeform-inner img{
      position:absolute;
      width:280px;
      opacity:1;
      box-shadow:0 30px 80px rgba(0,0,0,.95);
      z-index:20;
      pointer-events:none;
      user-select:none;
      transition:opacity 0.35s ease;
    }

    .freeform-title{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      pointer-events:none;
      z-index:5;
      text-align:center;
      opacity:0.82;
      transform:translateY(12px);
      will-change:opacity, transform;
    }

    .freeform-title h1,
    .arcade-card-title,
    .customization-title,
    .directors-title,
    .sky-limit-title,
    .lets-connect-title{
      font-family:"Cormorant Garamond", serif;
      text-transform:uppercase;
    }

    .freeform-title h1{
      font-size:3.4rem;
      letter-spacing:.35em;
      opacity:.45;
      color:#f5d9a6;
    }

    .freeform-title p{
      margin-top:14px;
      opacity:.35;
      letter-spacing:.18em;
      color:#f5d9a6;
      text-transform:uppercase;
      font-size:.9rem;
    }

    .bg4-stage{
      position:relative;
      height:100vh;
      overflow:hidden;
      background:#000;
      isolation:isolate;
      z-index:1;
    }

    .bg4-base, .bg5-top{
      position:absolute;
      inset:0;
      background-repeat:no-repeat;
      background-size:cover;
      will-change:transform, opacity;
    }

    .bg4-base{
      background-image:url("bg4.jpeg");
      background-position:center center;
      z-index:1;
      opacity:1;
      transform:scale(1);
    }

    .bg5-top{
      background-image:url("bg5.png");
      background-position:center center;
      z-index:4;
      opacity:0;
      transform:scale(1.08);
    }

    .bg4-overlay, .bg5-overlay{ position:absolute; inset:0; pointer-events:none; }

    .bg4-overlay{
      z-index:2;
      background:linear-gradient(to bottom, rgba(0,0,0,0.10), rgba(0,0,0,0.24));
      opacity:1;
    }

    .bg5-overlay{
      z-index:5;
      background:
        radial-gradient(circle at 50% 20%, rgba(212,157,93,0.14), transparent 28%),
        linear-gradient(to bottom, rgba(0,0,0,0.14), rgba(0,0,0,0.28));
      opacity:0;
    }

    .bg4-stage::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:180px;
      z-index:20;
      pointer-events:none;
      background:linear-gradient(to bottom, #000 0%, rgba(0,0,0,0.88) 14%, rgba(0,0,0,0.62) 38%, rgba(0,0,0,0.26) 66%, rgba(0,0,0,0) 100%);
    }

    .bg4-stage::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:30vh;
      z-index:25;
      pointer-events:none;
      background:
        linear-gradient(to bottom,
          rgba(0,0,0,0) 0%,
          rgba(7,5,4,0.16) 24%,
          rgba(11,8,6,0.38) 52%,
          rgba(18,12,8,0.68) 76%,
          rgba(5,5,5,0.95) 100%);
    }

    #projectsJourney{
      position:absolute;
      inset:0;
      z-index:10;
      opacity:0;
      overflow:hidden;
      background:#090705;
      pointer-events:auto;
      isolation:isolate;
    }

    #projectsJourney::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 120%, rgba(204,156,84,0.10), transparent 35%),
        #090705;
    }

    .arcade-note{
      position:absolute;
      top:12vh;
      left:50%;
      transform:translateX(-50%);
      z-index:50;
      font-size:0.95rem;
      letter-spacing:0.34em;
      text-transform:uppercase;
      color:#fff3d4;
      text-shadow:0 4px 18px rgba(0,0,0,0.95), 0 0 28px rgba(255,210,140,0.35);
      white-space:nowrap;
      pointer-events:none;
      opacity:1;
    }

    .arcade-shell{
      position:absolute;
      inset:0;
      z-index:2;
      display:flex;
      align-items:center;
      overflow:hidden;
      cursor:grab;
      user-select:none;
      touch-action:pan-y;
      background:#090705;
    }

    .arcade-shell.dragging{ cursor:grabbing; }

    .arcade-track{
      display:flex;
      gap:1.6vw;
      padding:0 18vw 0 20vw;
      will-change:transform;
      transform:translate3d(0,0,0);
    }

    .arcade-card{
      flex:0 0 64vw;
      max-width:860px;
      min-width:760px;
      height:52vh;
      position:relative;
      display:grid;
      grid-template-columns:0.92fr 1.08fr;
      border-radius:24px;
      overflow:hidden;
      background:linear-gradient(180deg, #1f140d, #120d09);
      box-shadow:0 24px 64px rgba(0,0,0,0.52), inset 0 1px 0 rgba(255,240,220,0.04);
    }

    .arcade-card::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:24px;
      padding:1px;
      background:linear-gradient(135deg, rgba(96,62,31,0.95) 0%, rgba(199,154,87,0.95) 18%, rgba(125,83,43,0.92) 42%, rgba(74,48,27,0.96) 68%, rgba(199,154,87,0.82) 100%);
      -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
    }

    .arcade-left{
      position:relative;
      z-index:2;
      padding:34px 26px 30px 32px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      background:linear-gradient(180deg, #24170f, #16100b);
    }

    .arcade-index{
      font-family:"Cormorant Garamond", serif;
      font-size:0.82rem;
      letter-spacing:0.35em;
      color:rgba(215,181,120,0.78);
