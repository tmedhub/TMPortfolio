<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Museum Experience</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<style>
:root{
  --x:50%;
  --y:50%;
  --torchW:420px;
  --torchH:620px;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  background:#000;
  overflow-x:hidden;
  cursor:none;
}

/* SCROLL SYSTEM */
.scroll-shell{
  height:500vh;
}

.scene-pin{
  position:sticky;
  top:0;
  height:100vh;
  overflow:hidden;
}

.scene{
  position:relative;
  width:100%;
  height:100%;
  overflow:hidden;
}

/* LAYERS */
.layer{
  position:absolute;
  left:50%;
  top:50%;
  width:120vw;
  height:120vh;
  object-fit:cover;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

/* Z INDEX */
.sky{z-index:1;}
.mid{z-index:2;}
.museum{z-index:3;}
.foreground{z-index:4;}
.hallway{
  z-index:6;
  clip-path:circle(0% at 50% 58%);
}

/* TORCH DARKNESS */
#darkness{
  position:absolute;
  inset:0;
  background:black;
  z-index:20;
  pointer-events:none;

  mask-image:radial-gradient(
    var(--torchW) var(--torchH) at var(--x) var(--y),
    transparent 0%,
    rgba(0,0,0,.3) 35%,
    black 65%
  );

  -webkit-mask-image:radial-gradient(
    var(--torchW) var(--torchH) at var(--x) var(--y),
    transparent 0%,
    rgba(0,0,0,.3) 35%,
    black 65%
  );

  transition:opacity 1.2s ease;
}

/* TORCH IMAGE */
#torch{
  position:fixed;
  width:80px;
  transform:translate(-50%,-20%) rotate(-20deg);
  pointer-events:none;
  z-index:30;
}

/* OPTIONAL VIGNETTE */
.vignette{
  position:absolute;
  inset:0;
  z-index:10;
  pointer-events:none;
  background:radial-gradient(circle at center,
    transparent 40%,
    rgba(0,0,0,0.3) 70%,
    rgba(0,0,0,0.7) 100%);
}
</style>
</head>

<body>

<img id="torch" src="torch.png"/>

<div class="scroll-shell">
  <div class="scene-pin">
    <div class="scene">

      <!-- LAYERS -->
      <img class="layer sky" src="sky.png"/>
      <img class="layer mid" src="mid.png"/>
      <img class="layer museum" src="museum.png"/>
      <img class="layer foreground" src="plaque.png"/>
      <img class="layer hallway" id="hallway" src="hallway.png"/>

      <div class="vignette"></div>
      <div id="darkness"></div>

    </div>
  </div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

const root = document.documentElement;
const torch = document.getElementById("torch");
const darkness = document.getElementById("darkness");
const hallway = document.getElementById("hallway");

let introDone = false;

/* TORCH FOLLOW (YOUR LOGIC STYLE) */
document.addEventListener("mousemove", e=>{
  root.style.setProperty("--x", e.clientX + "px");
  root.style.setProperty("--y", e.clientY + "px");

  torch.style.left = e.clientX + "px";
  torch.style.top = e.clientY + "px";
});

/* INTRO FADE */
setTimeout(()=>{
  darkness.style.opacity = 0;
  torch.style.opacity = 0;

  setTimeout(()=>{
    darkness.style.display="none";
    introDone = true;
  },1200);
},2000);

/* SCROLL ANIMATION */
const tl = gsap.timeline({
  scrollTrigger:{
    trigger:".scroll-shell",
    start:"top top",
    end:"+=4000",
    scrub:true,
    pin:".scene-pin"
  }
});

/* PARALLAX */
tl.to(".sky",{y:-60, scale:1.15},0);
tl.to(".mid",{y:-140, scale:1.25},0);
tl.to(".museum",{y:-220, scale:1.5},0);
tl.to(".foreground",{y:-350, scale:1.4},0);

/* APPROACH */
tl.to(".museum",{y:-450, scale:2.2},1.2);
tl.to(".foreground",{y:-650, opacity:0},1.2);

/* DOORWAY REVEAL */
tl.to(hallway,{
  clipPath:"circle(10% at 50% 58%)",
  scale:1.1
},2.2);

tl.to(hallway,{
  clipPath:"circle(25% at 50% 58%)"
},2.6);

tl.to(hallway,{
  clipPath:"circle(60% at 50% 58%)"
},3);

tl.to(hallway,{
  clipPath:"circle(140% at 50% 58%)",
  scale:1
},3.6);

/* FADE EXTERIOR AFTER */
tl.to([".sky",".mid",".museum"],{
  opacity:0
},3.8);

/* FINAL INTERIOR */
tl.to(hallway,{
  y:-80,
  scale:1.08
},4.3);

</script>
</body>
</html>
