<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torch to bg2 to bg3</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <link rel="preload" as="image" href="bg1.png">
  <link rel="preload" as="image" href="bg2.jpeg">
  <link rel="preload" as="image" href="bg3.jpeg">
  <style>
    :root{
      --x:50%;
      --y:50%;
      --torchW:420px;
      --torchH:620px;
      --gold:#f5d9a6;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html,body{
      background:#000;
      color:var(--gold);
      font-family:Georgia, serif;
      overflow-x:hidden;
      scroll-behavior:smooth;
    }

    html.lock-scroll,
    body.lock-scroll{
      overflow:hidden !important;
      height:100%;
      touch-action:none;
    }

    body{min-height:100vh}
    button{
      font:inherit;
      color:inherit;
      border:none;
      background:none;
      cursor:pointer;
    }

    .top-btn{
      position:fixed;
      top:18px;
      z-index:1000;
      display:inline-flex;
      align-items:center;
      gap:.8rem;
      padding:.9rem 1.1rem;
      border-radius:999px;
      border:1px solid rgba(245,217,166,.28);
      background:rgba(0,0,0,.28);
      color:var(--gold);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      letter-spacing:.14em;
      text-transform:uppercase;
      font-size:.72rem;
      transition:transform .22s ease, background .22s ease, border-color .22s ease;
    }
    .top-btn:hover{
      transform:translateY(-2px);
      background:rgba(18,14,11,.55);
      border-color:rgba(245,217,166,.45);
    }

    .menu-toggle{left:18px}
    .work-toggle{right:18px}

    .burger{display:grid;gap:4px}
    .burger span{
      display:block;
      width:18px;
      height:1.5px;
      background:currentColor;
      border-radius:999px;
    }

    .menu-panel{
      position:fixed;
      left:18px;
      top:68px;
      width:310px;
      padding:1.1rem 1.35rem 1.35rem;
      background:rgba(0,0,0,.98);
      z-index:1010;
      opacity:0;
      pointer-events:none;
      transform:translateY(-8px);
      transition:opacity .22s ease, transform .22s ease;
    }
    .menu-panel.open{
      opacity:1;
      pointer-events:auto;
      transform:translateY(0);
    }
    .menu-top{display:flex;justify-content:flex-end}
    .menu-close{
      width:28px;
      height:28px;
      display:grid;
      place-items:center;
      color:var(--gold);
    }
    .menu-list{display:grid;gap:1.95rem;padding-top:.35rem}
    .menu-link{width:100%;text-align:left}
    .menu-link strong{display:block;font-size:1.08rem;font-weight:600}
    .menu-link span{
      display:block;
      margin-top:.36rem;
      font-size:.72rem;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:rgba(245,217,166,.82);
    }

    /* torch scene */
    #hero{
      position:relative;
      height:100vh;
      background:#000;
      cursor:none;
      overflow:hidden;
    }

    #scene{
      position:absolute;
      inset:0;
      background:url("bg1.png") center bottom/cover no-repeat;
      z-index:1;
    }

    #darkness{
      position:absolute;
      inset:0;
      background:black;
      pointer-events:none;
      z-index:10;
      mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      -webkit-mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      transition:opacity 2.2s ease;
    }

    #torch{
      position:absolute;
      width:70px;
      pointer-events:none;
      transform:translate(-50%,-15%) rotate(-20deg);
      z-index:20;
      transition:opacity .6s ease;
    }

    /* Cinematic section - full parallax with zoom */
    #cinematic{
      position:relative;
      height:500vh;
      background:#000;
    }

    .cin-sticky{
      position:sticky;
      top:0;
      height:100vh;
      overflow:hidden;
      background:#000;
    }

    /* All backgrounds stacked, never showing black */
    #bg2-image{
      position:absolute;
      inset:0;
      background:url("bg2.jpeg") center 30%/cover no-repeat;
      will-change:transform;
      z-index:2;
    }

    #bg3-image{
      position:absolute;
      inset:0;
      background:url("bg3.jpeg") center center/cover no-repeat;
      will-change:transform;
      z-index:1;
    }

    .cin-vignette{
      position:absolute;
      inset:0;
      background:radial-gradient(ellipse 90% 80% at 50% 50%,
        transparent 55%,
        rgba(0,0,0,.28) 100%);
      pointer-events:none;
      z-index:3;
    }

    /* Hold sections */
    #bg2Hold{
      position:relative;
      height:100vh;
      background:url("bg2.jpeg") center 30%/cover no-repeat #000;
    }

    #bg3Hold{
      position:relative;
      height:100vh;
      background:url("bg3.jpeg") center center/cover no-repeat #000;
    }

    @media (max-width:720px){
      .top-btn{
        top:14px;
        font-size:.66rem;
        padding:.8rem .95rem;
      }
      .menu-toggle{left:14px}
      .work-toggle{right:14px}
      .menu-panel{
        top:62px;
        left:14px;
        width:min(310px, calc(100vw - 28px));
      }
    }
  </style>
</head>
<body>
  <button class="top-btn menu-toggle" id="menuToggle">
    <span class="burger"><span></span><span></span><span></span></span>
    <span>Museum's Galleries</span>
  </button>

  <button class="top-btn work-toggle">Let's Work Together</button>

  <div class="menu-panel" id="menuPanel">
    <div class="menu-top">
      <button class="menu-close" id="menuClose">✕</button>
    </div>
    <div class="menu-list">
      <button class="menu-link"><strong>Canvas Studio</strong><span>Gallery 01</span></button>
      <button class="menu-link"><strong>Project Arcade</strong><span>Gallery 02</span></button>
      <button class="menu-link"><strong>Customization Co-op</strong><span>Gallery 03</span></button>
      <button class="menu-link"><strong>Director's Dome</strong><span>Gallery 04</span></button>
    </div>
  </div>

  <!-- torch scene -->
  <section id="hero">
    <div id="scene"></div>
    <div id="darkness"></div>
    <img id="torch" src="torchtm.png" alt="Torch" />
  </section>

  <!-- cinematic: bg2 → bg3 with zoom transitions -->
  <section id="cinematic">
    <div class="cin-sticky">
      <div id="bg3-image"></div>
      <div id="bg2-image"></div>
      <div class="cin-vignette"></div>
    </div>
  </section>

  <!-- bg2 hold section -->
  <section id="bg2Hold"></section>

  <!-- bg3 hold section -->
  <section id="bg3Hold"></section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const root = document.documentElement;
    const torch = document.getElementById("torch");
    const dark = document.getElementById("darkness");
    const menuToggle = document.getElementById("menuToggle");
    const menuPanel = document.getElementById("menuPanel");
    const menuClose = document.getElementById("menuClose");
    const wheelOpts = { passive: false };

    function preventScroll(e){
      e.preventDefault();
      window.scrollTo(0, 0);
    }

    function preventKeyScroll(e){
      const keys = ["ArrowUp","ArrowDown","PageUp","PageDown","Home","End"," "];
      if(keys.includes(e.key)){
        e.preventDefault();
        window.scrollTo(0, 0);
      }
    }

    function lockScroll(){
      root.classList.add("lock-scroll");
      document.body.classList.add("lock-scroll");
      window.scrollTo(0, 0);
      window.addEventListener("wheel", preventScroll, wheelOpts);
      window.addEventListener("touchmove", preventScroll, wheelOpts);
      window.addEventListener("keydown", preventKeyScroll, true);
    }

    function unlockScroll(){
      root.classList.remove("lock-scroll");
      document.body.classList.remove("lock-scroll");
      window.removeEventListener("wheel", preventScroll, wheelOpts);
      window.removeEventListener("touchmove", preventScroll, wheelOpts);
      window.removeEventListener("keydown", preventKeyScroll, true);
      document.body.style.cursor = "auto";
      ScrollTrigger.refresh();
    }

    menuToggle.addEventListener("click", () => menuPanel.classList.toggle("open"));
    menuClose.addEventListener("click", () => menuPanel.classList.remove("open"));
    document.addEventListener("click", e => {
      if (!menuPanel.contains(e.target) && !menuToggle.contains(e.target)) {
        menuPanel.classList.remove("open");
      }
    });

    document.addEventListener("mousemove", e => {
      root.style.setProperty("--x", e.clientX + "px");
      root.style.setProperty("--y", e.clientY + "px");
      torch.style.left = e.clientX + "px";
      torch.style.top = e.clientY + "px";
    });

    lockScroll();
    setTimeout(() => {
      dark.style.opacity = 0;
      torch.style.opacity = 0;
      unlockScroll();
      ScrollTrigger.refresh();
    }, 2500);

    const cinematicEl = document.getElementById("cinematic");
    const bg2Image = document.getElementById("bg2-image");
    const bg3Image = document.getElementById("bg3-image");

    /* PHASE 1: Zoom into middle-bottom of bg2 (0-20% scroll) */
    gsap.fromTo(bg2Image,
      { scale: 2.5, yPercent: 40, opacity: 1 },
      {
        scale: 1.05, yPercent: 0,
        ease: "power2.out",
        scrollTrigger: {
          trigger: cinematicEl,
          start: "top top",
          end: "20% top",
          scrub: 1.5,
        }
      }
    );

    /* PHASE 2: Parallax on bg2 (20-40% scroll) */
    gsap.to(bg2Image,
      {
        scale: 1.15, yPercent: -8,
        ease: "none",
        scrollTrigger: {
          trigger: cinematicEl,
          start: "20% top",
          end: "40% top",
          scrub: 1.5,
        }
      }
    );

    /* PHASE 3: Fade out bg2 & zoom into center of bg3 (40-70% scroll) */
    gsap.to(bg2Image,
      {
        opacity: 0,
        ease: "power2.inOut",
        scrollTrigger: {
          trigger: cinematicEl,
          start: "40% top",
          end: "50% top",
          scrub: 1.5,
        }
      }
    );

    gsap.fromTo(bg3Image,
      { scale: 2.5, yPercent: 0, opacity: 1 },
      {
        scale: 1.08, yPercent: 0,
        ease: "power2.out",
        scrollTrigger: {
          trigger: cinematicEl,
          start: "40% top",
          end: "70% top",
          scrub: 1.5,
        }
      }
    );

    /* PHASE 4: Parallax on bg3 (70-100% scroll) */
    gsap.to(bg3Image,
      {
        scale: 1.18, yPercent: -10,
        ease: "none",
        scrollTrigger: {
          trigger: cinematicEl,
          start: "70% top",
          end: "100% top",
          scrub: 1.5,
        }
      }
    );

    /* bg2Hold - continues with appropriate scale */
    gsap.fromTo("#bg2Hold",
      { scale: 1 },
      {
        scale: 1.08,
        ease: "none",
        scrollTrigger: {
          trigger: "#bg2Hold",
          start: "top top",
          end: "bottom top",
          scrub: 1.5,
        }
      }
    );

    /* bg3Hold - continues smoothly */
    gsap.fromTo("#bg3Hold",
      { scale: 1.08 },
      {
        scale: 1.16,
        ease: "none",
        scrollTrigger: {
          trigger: "#bg3Hold",
          start: "top top",
          end: "bottom top",
          scrub: 1.5,
        }
      }
    );
  </script>
</body>
</html>
