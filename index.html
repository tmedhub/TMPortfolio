<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torch to bg2 to bg3</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    :root{
      --x:50%;
      --y:50%;
      --torchW:420px;
      --torchH:620px;
      --gold:#f5d9a6;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html,body{
      background:#000;
      color:var(--gold);
      font-family:Georgia, serif;
      overflow-x:hidden;
      scroll-behavior:smooth;
    }

    html.lock-scroll,
    body.lock-scroll{
      overflow:hidden !important;
      height:100%;
      touch-action:none;
    }

    body{min-height:100vh}
    button{
      font:inherit;
      color:inherit;
      border:none;
      background:none;
      cursor:pointer;
    }

    /* fixed buttons */
    .top-btn{
      position:fixed;
      top:18px;
      z-index:1000;
      display:inline-flex;
      align-items:center;
      gap:.8rem;
      padding:.9rem 1.1rem;
      border-radius:999px;
      border:1px solid rgba(245,217,166,.28);
      background:rgba(0,0,0,.28);
      color:var(--gold);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      letter-spacing:.14em;
      text-transform:uppercase;
      font-size:.72rem;
      transition:transform .22s ease, background .22s ease, border-color .22s ease;
    }
    .top-btn:hover{
      transform:translateY(-2px);
      background:rgba(18,14,11,.55);
      border-color:rgba(245,217,166,.45);
    }

    .menu-toggle{left:18px}
    .work-toggle{right:18px}

    .burger{display:grid;gap:4px}
    .burger span{
      display:block;
      width:18px;
      height:1.5px;
      background:currentColor;
      border-radius:999px;
    }

    .menu-panel{
      position:fixed;
      left:18px;
      top:68px;
      width:310px;
      padding:1.1rem 1.35rem 1.35rem;
      background:rgba(0,0,0,.98);
      z-index:1010;
      opacity:0;
      pointer-events:none;
      transform:translateY(-8px);
      transition:opacity .22s ease, transform .22s ease;
    }
    .menu-panel.open{
      opacity:1;
      pointer-events:auto;
      transform:translateY(0);
    }
    .menu-top{display:flex;justify-content:flex-end}
    .menu-close{
      width:28px;
      height:28px;
      display:grid;
      place-items:center;
      color:var(--gold);
    }
    .menu-list{display:grid;gap:1.95rem;padding-top:.35rem}
    .menu-link{width:100%;text-align:left}
    .menu-link strong{display:block;font-size:1.08rem;font-weight:600}
    .menu-link span{
      display:block;
      margin-top:.36rem;
      font-size:.72rem;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:rgba(245,217,166,.82);
    }

    /* ── torch / hero ── */
    #hero{
      position:relative;
      height:100vh;
      background:#000;
      cursor:none;
      overflow:hidden;
    }

    #scene{
      position:absolute;
      inset:0;
      background:url("bg1.png") center bottom/cover no-repeat;
      z-index:1;
    }

    #darkness{
      position:absolute;
      inset:0;
      background:black;
      pointer-events:none;
      z-index:10;
      mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      -webkit-mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      transition:opacity 2.2s ease;
    }

    #torch{
      position:absolute;
      width:70px;
      pointer-events:none;
      transform:translate(-50%,-15%) rotate(-20deg);
      z-index:20;
      transition:opacity .6s ease;
    }

    /* ── CINEMATIC PARALLAX SECTION ──
       Key fix: bg3 sits BEHIND bg2 inside a shared stacking context.
       bg2 scrolls up/out using clip-path, revealing bg3 beneath.
       No filmstrip translation → no gap → no black screen.
    ── */
    #cinematic{
      position:relative;
      /* 2× scroll distance: first 100vh = bg2 visible, second 100vh = bg3 revealed */
      height:300vh;
    }

    .cin-sticky{
      position:sticky;
      top:0;
      height:100vh;
      overflow:hidden;
    }

    /* bg3 is the bottom layer — always fully visible inside the sticky */
    #bg3-layer{
      position:absolute;
      inset:0;
      background:url("bg3.jpeg") center center/cover no-repeat;
      /* subtle Ken Burns on bg3 */
      will-change:transform;
    }

    /* bg2 sits on top, clips away upward as user scrolls */
    #bg2-layer{
      position:absolute;
      inset:0;
      background:url("bg2.jpeg") center center/cover no-repeat;
      /* clip starts full-height; GSAP shrinks it from the top */
      clip-path:inset(0 0 0 0);
      will-change:clip-path, transform;
    }

    /* parallax inner images (scale + drift handled by GSAP) */
    .parallax-bg{
      position:absolute;
      inset:-8% -4%;   /* slight overscan so edges never show during scale */
      background-size:cover;
      background-repeat:no-repeat;
      background-position:center center;
      will-change:transform;
    }

    #bg3-layer .parallax-bg{ background-image:url("bg3.jpeg"); }
    #bg2-layer .parallax-bg{ background-image:url("bg2.jpeg"); }

    /* optional cinematic vignette — no hard black, just a soft darkening of corners */
    .cin-vignette{
      position:absolute;
      inset:0;
      background:radial-gradient(ellipse 90% 80% at 50% 50%,
        transparent 55%,
        rgba(0,0,0,.28) 100%);
      pointer-events:none;
      z-index:3;
    }

    /* ── FINAL HOLD (bg3) ── */
    /* Sits directly after the sticky; bg3 image continues seamlessly */
    #bg3Hold{
      position:relative;
      height:100vh;
      overflow:hidden;
    }

    #bg3Hold .parallax-bg{
      background-image:url("bg3.jpeg");
      /* start at the same visual position the sticky left off */
      transform:scale(1.12) translateY(0%);
    }

    @media (max-width:720px){
      .top-btn{
        top:14px;
        font-size:.66rem;
        padding:.8rem .95rem;
      }
      .menu-toggle{left:14px}
      .work-toggle{right:14px}
      .menu-panel{
        top:62px;
        left:14px;
        width:min(310px, calc(100vw - 28px));
      }
    }
  </style>
</head>
<body>
  <button class="top-btn menu-toggle" id="menuToggle">
    <span class="burger"><span></span><span></span><span></span></span>
    <span>Museum's Galleries</span>
  </button>

  <button class="top-btn work-toggle">Let's Work Together</button>

  <div class="menu-panel" id="menuPanel">
    <div class="menu-top">
      <button class="menu-close" id="menuClose">✕</button>
    </div>
    <div class="menu-list">
      <button class="menu-link"><strong>Canvas Studio</strong><span>Gallery 01</span></button>
      <button class="menu-link"><strong>Project Arcade</strong><span>Gallery 02</span></button>
      <button class="menu-link"><strong>Customization Co-op</strong><span>Gallery 03</span></button>
      <button class="menu-link"><strong>Director's Dome</strong><span>Gallery 04</span></button>
    </div>
  </div>

  <!-- ── bg1 torch scene ── -->
  <section id="hero">
    <div id="scene"></div>
    <div id="darkness"></div>
    <img id="torch" src="torchtm.png" alt="Torch" />
  </section>

  <!-- ── cinematic parallax: bg2 → bg3 ── -->
  <section id="cinematic">
    <div class="cin-sticky">
      <!-- bg3 renders first (bottom of stack) -->
      <div id="bg3-layer">
        <div class="parallax-bg"></div>
      </div>
      <!-- bg2 on top; clips away upward on scroll -->
      <div id="bg2-layer">
        <div class="parallax-bg"></div>
      </div>
      <div class="cin-vignette"></div>
    </div>
  </section>

  <!-- ── bg3 hold / continues after sticky ── -->
  <section id="bg3Hold">
    <div class="parallax-bg"></div>
    <div class="cin-vignette"></div>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const root       = document.documentElement;
    const torch      = document.getElementById("torch");
    const dark       = document.getElementById("darkness");
    const menuToggle = document.getElementById("menuToggle");
    const menuPanel  = document.getElementById("menuPanel");
    const menuClose  = document.getElementById("menuClose");
    const wheelOpts  = { passive: false };

    /* ── scroll lock ── */
    function preventScroll(e){ e.preventDefault(); window.scrollTo(0,0); }
    function preventKeyScroll(e){
      if(["ArrowUp","ArrowDown","PageUp","PageDown","Home","End"," "].includes(e.key)){
        e.preventDefault(); window.scrollTo(0,0);
      }
    }
    function lockScroll(){
      root.classList.add("lock-scroll");
      document.body.classList.add("lock-scroll");
      window.scrollTo(0,0);
      window.addEventListener("wheel",        preventScroll,    wheelOpts);
      window.addEventListener("touchmove",    preventScroll,    wheelOpts);
      window.addEventListener("keydown",      preventKeyScroll, true);
    }
    function unlockScroll(){
      root.classList.remove("lock-scroll");
      document.body.classList.remove("lock-scroll");
      window.removeEventListener("wheel",     preventScroll,    wheelOpts);
      window.removeEventListener("touchmove", preventScroll,    wheelOpts);
      window.removeEventListener("keydown",   preventKeyScroll, true);
      document.body.style.cursor = "auto";
      ScrollTrigger.refresh();
    }

    /* ── menu ── */
    menuToggle.addEventListener("click", () => menuPanel.classList.toggle("open"));
    menuClose .addEventListener("click", () => menuPanel.classList.remove("open"));
    document  .addEventListener("click", e => {
      if(!menuPanel.contains(e.target) && !menuToggle.contains(e.target))
        menuPanel.classList.remove("open");
    });

    /* ── torch follow ── */
    document.addEventListener("mousemove", e => {
      root.style.setProperty("--x", e.clientX + "px");
      root.style.setProperty("--y", e.clientY + "px");
      torch.style.left = e.clientX + "px";
      torch.style.top  = e.clientY + "px";
    });

    /* ── torch reveal ── */
    lockScroll();
    setTimeout(() => {
      dark.style.opacity  = 0;
      torch.style.opacity = 0;
      unlockScroll();
    }, 2500);

    /* ─────────────────────────────────────────────
       CINEMATIC PARALLAX — zero black screen approach
       
       Instead of translating a filmstrip (which exposes the
       black container background at the seam), we:
       
       1. Keep bg3 always visible as the bottom layer.
       2. Clip bg2 from the bottom of the sticky frame upward
          using clip-path:inset(top 0 0 0), animating `top`
          from 0% → 100%.  bg3 shows through underneath.
       3. Both bg images get a gentle parallax drift (scale +
          translateY) so they feel alive while clipping.
       4. #bg3Hold continues the same bg3 image with the same
          transform so the cut between sticky end and hold is
          seamless — both images are positioned identically.
    ───────────────────────────────────────────── */

    const cinematicEl  = document.getElementById("cinematic");
    const bg2Layer     = document.getElementById("bg2-layer");
    const bg2Parallax  = bg2Layer.querySelector(".parallax-bg");
    const bg3Parallax  = document.querySelector("#bg3-layer .parallax-bg");
    const holdParallax = document.querySelector("#bg3Hold .parallax-bg");

    /* Phase 1 — first 100vh of cinematic scroll:
       bg2 clips away from the top, bg3 revealed beneath */
    gsap.to(bg2Layer, {
      clipPath: "inset(100% 0 0 0)",
      ease: "none",
      scrollTrigger: {
        trigger: cinematicEl,
        start:   "top top",
        end:     "33.33% top",   /* first third of 300vh = 100vh */
        scrub:   1.2,
      }
    });

    /* bg2 parallax drift (Ken Burns while it's visible) */
    gsap.fromTo(bg2Parallax,
      { scale: 1.04, yPercent: 0 },
      {
        scale: 1.14, yPercent: -4,
        ease: "none",
        scrollTrigger: {
          trigger: cinematicEl,
          start:   "top top",
          end:     "33.33% top",
          scrub:   1.5,
        }
      }
    );

    /* bg3 parallax drift (continues through both bg3 phases) */
    gsap.fromTo(bg3Parallax,
      { scale: 1.04, yPercent: 0 },
      {
        scale: 1.16, yPercent: -5,
        ease: "none",
        scrollTrigger: {
          trigger: cinematicEl,
          start:   "top top",
          end:     "bottom top",
          scrub:   1.5,
        }
      }
    );

    /* #bg3Hold — continues bg3 parallax seamlessly.
       It picks up where the sticky left off so there's no jump. */
    gsap.fromTo(holdParallax,
      { scale: 1.16, yPercent: -5 },
      {
        scale: 1.22, yPercent: -9,
        ease: "none",
        scrollTrigger: {
          trigger: "#bg3Hold",
          start:   "top bottom",
          end:     "bottom top",
          scrub:   1.5,
        }
      }
    );
  </script>
</body>
</html>
