<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bg1-bg2-bg3 seamless stage</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    :root{
      --x:50%;
      --y:50%;
      --torchW:420px;
      --torchH:620px;
      --gold:#f5d9a6;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    html,body{
      width:100%;
      min-height:100%;
      background:#000;
      color:var(--gold);
      font-family:Georgia, serif;
      overflow-x:hidden;
      scroll-behavior:smooth;
    }

    html.lock-scroll,
    body.lock-scroll{
      overflow:hidden !important;
      height:100%;
      touch-action:none;
    }

    button{
      font:inherit;
      color:inherit;
      border:none;
      background:none;
      cursor:pointer;
    }

    .top-btn{
      position:fixed;
      top:18px;
      z-index:500;
      display:inline-flex;
      align-items:center;
      gap:.8rem;
      padding:.9rem 1.1rem;
      border-radius:999px;
      border:1px solid rgba(245,217,166,.28);
      background:rgba(0,0,0,.28);
      color:var(--gold);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      letter-spacing:.14em;
      text-transform:uppercase;
      font-size:.72rem;
    }

    .menu-toggle{left:18px}
    .work-toggle{right:18px}

    .burger{display:grid;gap:4px}
    .burger span{
      display:block;
      width:18px;
      height:1.5px;
      border-radius:999px;
      background:currentColor;
    }

    .menu-panel{
      position:fixed;
      left:18px;
      top:68px;
      width:310px;
      padding:1.1rem 1.35rem 1.35rem;
      background:rgba(0,0,0,.98);
      z-index:520;
      opacity:0;
      pointer-events:none;
      transform:translateY(-8px);
      transition:opacity .22s ease, transform .22s ease;
    }

    .menu-panel.open{
      opacity:1;
      pointer-events:auto;
      transform:translateY(0);
    }

    .menu-top{display:flex;justify-content:flex-end}
    .menu-close{
      width:28px;
      height:28px;
      display:grid;
      place-items:center;
      color:var(--gold);
    }

    .menu-list{display:grid;gap:1.95rem;padding-top:.35rem}
    .menu-link{width:100%;text-align:left}
    .menu-link strong{display:block;font-size:1.08rem;font-weight:600}
    .menu-link span{
      display:block;
      margin-top:.36rem;
      font-size:.72rem;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:rgba(245,217,166,.82);
    }

    /* ONE MASTER PINNED VIEWPORT */
    #stage{
      position:relative;
      height:320vh;
      background:#000;
      cursor:none;
    }

    .stage-pin{
      position:sticky;
      top:0;
      height:100vh;
      overflow:hidden;
      background:#000;
    }

    .scene{
      position:absolute;
      inset:0;
      background-position:center center;
      background-size:cover;
      background-repeat:no-repeat;
      will-change:transform, opacity, filter;
    }

    /* deepest layer */
    #scene3{
      z-index:1;
      background-image:url("bg3.png");
      opacity:1;
      transform:scale(1.16) translate3d(0, 20px, 0);
    }

    /* middle layer */
    #scene2{
      z-index:2;
      background-image:url("bg2.jpeg");
      opacity:1;
      transform:scale(1.12) translate3d(0, 14px, 0);
    }

    /* top layer */
    #scene1{
      z-index:3;
      background-image:url("bg1.png");
      background-position:center bottom;
      opacity:1;
      transform:scale(1) translate3d(0, 0, 0);
    }

    .scene-vignette{
      position:absolute;
      inset:0;
      z-index:4;
      pointer-events:none;
      background:linear-gradient(
        180deg,
        rgba(0,0,0,.04),
        rgba(0,0,0,.10) 55%,
        rgba(0,0,0,.18)
      );
    }

    #darkness{
      position:absolute;
      inset:0;
      background:black;
      pointer-events:none;
      z-index:5;
      mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      -webkit-mask-image:radial-gradient(
        var(--torchW) var(--torchH) at var(--x) var(--y),
        transparent 0%,
        rgba(0,0,0,.25) 35%,
        black 65%
      );
      transition:opacity 2s ease;
    }

    #torch{
      position:absolute;
      width:70px;
      pointer-events:none;
      z-index:6;
      transform:translate(-50%,-15%) rotate(-20deg);
      will-change:left, top, opacity;
    }

    @media (max-width:720px){
      .top-btn{
        top:14px;
        font-size:.66rem;
        padding:.8rem .95rem;
      }
      .menu-toggle{left:14px}
      .work-toggle{right:14px}
      .menu-panel{
        top:62px;
        left:14px;
        width:min(310px, calc(100vw - 28px));
      }
    }
  </style>
</head>
<body>
  <button class="top-btn menu-toggle" id="menuToggle">
    <span class="burger"><span></span><span></span><span></span></span>
    <span>Museum’s Galleries</span>
  </button>

  <button class="top-btn work-toggle">Let’s Work Together</button>

  <div class="menu-panel" id="menuPanel">
    <div class="menu-top">
      <button class="menu-close" id="menuClose">✕</button>
    </div>
    <div class="menu-list">
      <button class="menu-link"><strong>Canvas Studio</strong><span>Gallery 01</span></button>
      <button class="menu-link"><strong>Project Arcade</strong><span>Gallery 02</span></button>
      <button class="menu-link"><strong>Customization Co-op</strong><span>Gallery 03</span></button>
      <button class="menu-link"><strong>Director's Dome</strong><span>Gallery 04</span></button>
    </div>
  </div>

  <section id="stage">
    <div class="stage-pin">
      <div id="scene3" class="scene"></div>
      <div id="scene2" class="scene"></div>
      <div id="scene1" class="scene"></div>
      <div class="scene-vignette"></div>
      <div id="darkness"></div>
      <img id="torch" src="torchtm.png" alt="Torch" />
    </div>
  </section>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const root = document.documentElement;
    const torch = document.getElementById("torch");
    const dark = document.getElementById("darkness");
    const menuToggle = document.getElementById("menuToggle");
    const menuPanel = document.getElementById("menuPanel");
    const menuClose = document.getElementById("menuClose");

    const wheelOpts = { passive:false };

    function preventScroll(e){
      e.preventDefault();
      window.scrollTo(0, 0);
    }

    function preventKeyScroll(e){
      const keys = ["ArrowUp","ArrowDown","PageUp","PageDown","Home","End"," "];
      if(keys.includes(e.key)){
        e.preventDefault();
        window.scrollTo(0, 0);
      }
    }

    function lockScroll(){
      document.documentElement.classList.add("lock-scroll");
      document.body.classList.add("lock-scroll");
      window.scrollTo(0, 0);
      window.addEventListener("wheel", preventScroll, wheelOpts);
      window.addEventListener("touchmove", preventScroll, wheelOpts);
      window.addEventListener("keydown", preventKeyScroll, true);
    }

    function unlockScroll(){
      document.documentElement.classList.remove("lock-scroll");
      document.body.classList.remove("lock-scroll");
      window.removeEventListener("wheel", preventScroll, wheelOpts);
      window.removeEventListener("touchmove", preventScroll, wheelOpts);
      window.removeEventListener("keydown", preventKeyScroll, true);
      document.body.style.cursor = "auto";
      ScrollTrigger.refresh();
    }

    lockScroll();

    document.addEventListener("mousemove", e => {
      root.style.setProperty("--x", e.clientX + "px");
      root.style.setProperty("--y", e.clientY + "px");
      torch.style.left = e.clientX + "px";
      torch.style.top = e.clientY + "px";
    });

    setTimeout(() => {
      dark.style.opacity = 0;
      torch.style.opacity = 0;
      unlockScroll();
    }, 2500);

    menuToggle.addEventListener("click", () => menuPanel.classList.toggle("open"));
    menuClose.addEventListener("click", () => menuPanel.classList.remove("open"));
    document.addEventListener("click", e => {
      if (!menuPanel.contains(e.target) && !menuToggle.contains(e.target)) {
        menuPanel.classList.remove("open");
      }
    });

    /* ONE CONTINUOUS SCROLL FILM */
    const tl = gsap.timeline({
      scrollTrigger:{
        trigger:"#stage",
        start:"top top",
        end:"bottom bottom",
        scrub:1
      }
    });

    /* bg1 pushes toward the entrance */
    tl.to("#scene1", {
      scale:1.22,
      yPercent:7,
      ease:"none"
    }, 0);

    /* bg2 subtly settles in underneath from the start */
    tl.to("#scene2", {
      scale:1,
      y:0,
      ease:"none"
    }, 0);

    /* bg1 only starts disappearing late */
    tl.to("#scene1", {
      opacity:0,
      ease:"none"
    }, 0.72);

    /* then movement continues deeper into bg3 */
    tl.to("#scene2", {
      scale:1.08,
      yPercent:-2,
      ease:"none"
    }, 0.72);

    tl.to("#scene3", {
      scale:1,
      y:0,
      ease:"none"
    }, 0.72);

    /* bg2 fades late, after bg3 is already fully present */
    tl.to("#scene2", {
      opacity:0,
      ease:"none"
    }, 0.92);
  </script>
</body>
</html>
