<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Museum of Me</title>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<style>
body{
  margin:0;
  background:#000;
  font-family:sans-serif;
  overflow-x:hidden;
}

/* ================= SCENE ================= */
.scene1-wrapper{
  position:relative;
  height:100vh;
  overflow:hidden;
}

/* 🔥 FADE INTO CANVAS */
.scene1-wrapper::after{
  content:"";
  position:absolute;
  bottom:0;
  width:100%;
  height:22vh;
  background:linear-gradient(to bottom, transparent, #000);
  z-index:10;
}

.layer{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ================= CANVAS ================= */
.canvas-wrap{
  height:100vh;
  background:#000;
  margin-top:-8vh;
  padding-top:8vh;
}

#freeform{
  position:absolute;
  inset:0;
}

.freeform-inner img{
  position:absolute;
  width:260px;
  transition:opacity 0.4s ease;
}

/* ================= PROJECT ARCADE ================= */
.bg4-stage{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.bg4-base,
.bg5-top,
.bg6{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
}

.bg4-base{ background-image:url("bg4.jpeg"); }
.bg5-top{ background-image:url("bg5.png"); opacity:0; }
.bg6{ background-image:url("bg6.PNG"); }

.projects{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  gap:60px;
  padding:0 10vw;
  opacity:0;
}

.project{
  min-width:70vw;
  height:60vh;
  background:#111;
  border:1px solid #d7b675;
  padding:40px;
  color:#fff;
}

</style>
</head>

<body>

<!-- ================= SCENE ================= -->
<section class="scene1-wrapper" id="scene1">
  <img src="bg1-sky.png" class="layer" id="sky">
  <img src="bg1-mid.png" class="layer" id="mid">
  <img src="bg1-front.PNG" class="layer" id="front">
  <img src="bg2-main.png" class="layer" id="bg2">
</section>

<!-- ================= CANVAS ================= -->
<section class="canvas-wrap" id="canvasStudio">
  <div id="freeform">
    <div class="freeform-inner" id="inner"></div>
  </div>
</section>

<!-- ================= PROJECT ARCADE ================= -->
<section class="bg4-stage" id="arcade">
  <div class="bg4-base" id="bg4"></div>
  <div class="bg5-top" id="bg5"></div>

  <div class="projects" id="projects">
    <div class="project">Clay Creation</div>
    <div class="project">Board Games</div>
    <div class="project">Events Hosted</div>
    <div class="project">Interactive Work</div>
  </div>
</section>

<section class="bg6"></section>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ================= SCENE ================= */
gsap.timeline({
  scrollTrigger:{
    trigger:"#scene1",
    start:"top top",
    end:"+=2000",
    scrub:1,
    pin:true
  }
})
.to("#sky",{y:40},0)
.to("#mid",{y:80},0)
.to("#front",{y:120},0)
.to("#bg2",{opacity:1},0.4);

/* ================= CANVAS (ORIGINAL + FADE FIX) ================= */
const inner = document.getElementById("inner");
let frames=[];
let posX=0,posY=0,velX=0,velY=0;

function place(f){
  f.x=Math.random()*2000-1000;
  f.y=Math.random()*2000-1000;
}

function build(){
  for(let i=0;i<8;i++){
    const img=document.createElement("img");
    img.src=`art${i+1}.png`;
    img.style.opacity="0";
    inner.appendChild(img);

    const f={img,x:0,y:0,opacity:0,target:0};
    place(f);
    frames.push(f);
  }

  loop();
}

function loop(){
  posX+=velX;
  posY+=velY;
  velX*=0.9;
  velY*=0.9;

  frames.forEach(f=>{
    const x=f.x+posX;
    const y=f.y+posY;

    const visible =
      x>-200 && x<window.innerWidth &&
      y>-200 && y<window.innerHeight;

    f.target = visible?1:0;
    f.opacity += (f.target - f.opacity)*0.08;

    if(Math.abs(x)>1200 || Math.abs(y)>900){
      place(f);
      f.opacity=0;
    }

    f.img.style.left=x+"px";
    f.img.style.top=y+"px";
    f.img.style.opacity=f.opacity;
  });

  requestAnimationFrame(loop);
}

ScrollTrigger.create({
  trigger:"#canvasStudio",
  start:"top top",
  onEnter:build
});

/* ================= ARCADE ================= */
gsap.timeline({
  scrollTrigger:{
    trigger:"#arcade",
    start:"top top",
    end:"+=4000",
    scrub:1,
    pin:true
  }
})

/* bg4 → bg5 */
.to("#bg4",{scale:1.1},0)
.to("#bg5",{opacity:1},0.2)

/* 🔥 ZOOM INTO YOUR CIRCLED SCREEN */
.to("#bg5",{
  scale:3,
  xPercent:25,
  yPercent:8
},0.5)

/* SHOW PROJECTS */
.to("#projects",{opacity:1},0.6)

/* HORIZONTAL SCROLL */
.to("#projects",{
  x:()=>-(document.getElementById("projects").scrollWidth - window.innerWidth)
},0.65)

/* FADE OUT → BG6 */
.to("#projects",{opacity:0},0.95)
.to("#bg5",{opacity:0},0.95);

</script>
</body>
</html>
